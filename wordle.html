<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wordle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #13111c;
      --surface: #1c1730;
      --surface2: #0d0b14;
      --brd: #4c1d95;
      --p: #6d28d9;
      --p-lt: #7c3aed;
      --p-xl: #a78bfa;
      --p-text: #e2d9f3;
      --muted: #7c6fa0;
      --correct: #538d4e;
      --present: #b59f3b;
      --absent: #3a3a3c;
      --key-bg: #2d2640;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      color: var(--p-text);
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 2px solid var(--brd);
    }

    .back-btn {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .back-btn:active { color: var(--p-xl); }

    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--p-xl);
    }

    .len-selector {
      display: flex;
      gap: 6px;
    }

    .len-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid var(--brd);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .len-btn.active {
      background: var(--p);
      border-color: var(--p-lt);
      color: #fff;
    }
    .len-btn:active { transform: scale(0.93); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--p-text);
      color: var(--bg);
      font-size: 0.9rem;
      font-weight: 800;
      padding: 8px 18px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Board ── */
    #board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
    }

    #board {
      display: grid;
      gap: 6px;
    }

    .tile-row {
      display: flex;
      gap: 6px;
    }

    .tile {
      width: var(--tile-size, 56px);
      height: var(--tile-size, 56px);
      border: 2px solid var(--brd);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--tile-size, 56px) * 0.48);
      font-weight: 900;
      letter-spacing: 0;
      color: var(--p-text);
      transition: border-color 0.1s;
      perspective: 250px;
      position: relative;
    }

    .tile.filled {
      border-color: var(--muted);
      animation: pop 0.1s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* Flip reveal */
    .tile.flip {
      animation: flip 0.5s ease forwards;
    }
    @keyframes flip {
      0%   { transform: rotateX(0deg); }
      49%  { transform: rotateX(-90deg); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }

    .tile.correct  { background: var(--correct);  border-color: var(--correct);  color: #fff; }
    .tile.present  { background: var(--present);  border-color: var(--present);  color: #fff; }
    .tile.absent   { background: var(--absent);   border-color: var(--absent);   color: #fff; }

    /* Shake invalid row */
    .tile-row.shake {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    /* Win bounce */
    .tile.bounce {
      animation: bounce 0.6s ease forwards;
    }
    @keyframes bounce {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(-16px); }
      50%  { transform: translateY(0); }
      70%  { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }

    /* ── Keyboard ── */
    #keyboard {
      width: 100%;
      max-width: 520px;
      padding: 8px 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .key-row {
      display: flex;
      gap: 5px;
    }

    .key {
      height: 54px;
      min-width: 36px;
      padding: 0 6px;
      border-radius: 6px;
      border: none;
      background: var(--key-bg);
      color: var(--p-text);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s, color 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .key.wide { min-width: 52px; font-size: 0.7rem; }
    .key:active { transform: scale(0.93); }

    .key.correct { background: var(--correct); color: #fff; }
    .key.present { background: var(--present); color: #fff; }
    .key.absent  { background: var(--absent);  color: #888; }

    /* ── End Modal ── */
    #modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 200;
    }
    #modal-backdrop.visible { opacity: 1; pointer-events: all; }

    #modal {
      background: var(--surface);
      border: 2px solid var(--brd);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 340px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      transform: scale(0.88);
      transition: transform 0.3s;
    }
    #modal-backdrop.visible #modal { transform: scale(1); }

    .modal-emoji { font-size: 3rem; line-height: 1; }
    .modal-title { font-size: 1.4rem; font-weight: 900; color: var(--p-xl); }
    .modal-subtitle { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }
    .modal-word { font-size: 2rem; font-weight: 900; letter-spacing: 0.12em; color: var(--p-text); }

    .define-link {
      display: inline-block;
      padding: 10px 20px;
      background: var(--p);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .define-link:active { background: var(--p-lt); }

    .play-again-btn {
      padding: 10px 24px;
      background: transparent;
      border: 2px solid var(--brd);
      color: var(--p-xl);
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.15s, background 0.15s;
    }
    .play-again-btn:active { background: var(--surface2); border-color: var(--p-lt); }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 300;
      animation: confetti-fall var(--dur) ease-in forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>

    'EXPECTED','FABULOUS','FAMILIAR','FOLLOWED','FOOTBALL','FORECAST','FORGIVEN',
    'FRIENDLY','FUNCTION','GENERATE','GIGANTIC','GRATEFUL','GREATEST','GUARDIAN',
    'GUIDANCE','HANDSOME','HAPPENED','HARDWARE','HUNDREDS','IDEALIZE','IDENTIFY',
    'INCOMING','INCREASE','INTERIOR','ISOLATE ','KNOCKOUT','LANDMARK','LAUNCHED',
    'LAYERING','LEARNING','LOCATION','MOVEMENT','MULTIPLE','MUSHROOM','NEIGHBOR',
    'NOTEBOOK','NUMEROUS','OBSTACLE','OCCUPIED','OCTOPUSS','OPPOSITE','ORDINARY',
    'OVERCOME','PANCAKES','PARADISE','PATIENCE','PEACEFUL','PENGUINS','PLATFORM',
    'PLAYFUL ','POSITIVE','POSSIBLE','POWERFUL','PRACTICE','PRECIOUS','PRESERVE',
    'PRINCESS','PROBABLE','PROGRESS','PROPERTY','QUESTION','RAINCOAT','REACHABLE',
    'RECENTLY','REMEMBER','REPORTER','REQUIRED','RESEARCH','RESOURCE','SCHEDULE',
    'SECURITY','SENSIBLE','SENTENCE','SHOPPING','SHOULDER','SKELETON','SNAPSHOT',
    'SOLUTION','SOMETIME','SPECIALS','SPLENDID','STANDARD','STARFISH','STARTING',
    'STRENGTH','STRUGGLE','STUMBLED','SURPRISE','SWIMMING','TEACHING','TEMPLATE',
    'THANKFUL','TOGETHER','TOMORROW','TREASURE','TROPICAL','UNIVERSE','VACATION',
    'VALUABLE','VEHICLES','WANDERED','WHATEVER','WHENEVER','WHEREVER','WILDLIFE',
    'WOODLAND','WORKSHOP','YOURSELF'
  ].map(w => w.trim()).filter(w => w.length === 8),
};

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  wordLen: 5,
  secret: '',
  guesses: [],
  feedbacks: [],
  currentRow: 0,
  currentInput: '',
  gameOver: false,
  won: false,
  keyStates: {},      // letter → 'correct'|'present'|'absent'
};

// ── DOM Refs ──────────────────────────────────────────────────────────────────
const boardEl    = document.getElementById('board');
const kbEl       = document.getElementById('keyboard');
const toastEl    = document.getElementById('toast');
const modalBd    = document.getElementById('modal-backdrop');
const modalEmoji = document.getElementById('modal-emoji');
const modalTitle = document.getElementById('modal-title');
const modalWord  = document.getElementById('modal-word');
const modalSub   = document.getElementById('modal-subtitle');
const defineLink = document.getElementById('define-link');
const playAgain  = document.getElementById('play-again-btn');
const lenSel     = document.getElementById('lenSelector');

// ── Length Selector ───────────────────────────────────────────────────────────
[5,6,7,8].forEach(n => {
  const btn = document.createElement('button');
  btn.className = 'len-btn' + (n === 5 ? ' active' : '');
  btn.textContent = n;
  btn.setAttribute('data-len', n);
  btn.addEventListener('click', () => {
    if (state.wordLen === n && !state.gameOver) return;
    document.querySelectorAll('.len-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.wordLen = n;
    newGame();
  });
  lenSel.appendChild(btn);
});

// ── Keyboard Layout ───────────────────────────────────────────────────────────
const ROWS = ['QWERTYUIOP', 'ASDFGHJKL', '←ZXCVBNM↵'];

function buildKeyboard() {
  kbEl.innerHTML = '';
  ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    [...row].forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'key' + (ch === '←' || ch === '↵' ? ' wide' : '');
      btn.textContent = ch === '←' ? '⌫' : ch === '↵' ? 'ENTER' : ch;
      btn.setAttribute('data-key', ch);
      btn.addEventListener('click', () => handleKey(ch));
      rowEl.appendChild(btn);
    });
    kbEl.appendChild(rowEl);
  });
}

function updateKeyboard() {
  document.querySelectorAll('.key[data-key]').forEach(btn => {
    const ch = btn.getAttribute('data-key');
    const s = state.keyStates[ch];
    btn.className = 'key' + (ch === '←' || ch === '↵' ? ' wide' : '') + (s ? ' ' + s : '');
  });
}

// ── Board ─────────────────────────────────────────────────────────────────────
function buildBoard() {
  const tileSize = state.wordLen <= 5 ? 56 : state.wordLen === 6 ? 50 : state.wordLen === 7 ? 44 : 38;
  boardEl.style.setProperty('--tile-size', tileSize + 'px');
  boardEl.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'tile-row';
    row.setAttribute('data-row', r);
    for (let c = 0; c < state.wordLen; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('data-row', r);
      tile.setAttribute('data-col', c);
      row.appendChild(tile);
    }
    boardEl.appendChild(row);
  }
}

function getTile(row, col) {
  return boardEl.querySelector(`.tile[data-row="${row}"][data-col="${col}"]`);
}

function getRow(row) {
  return boardEl.querySelector(`.tile-row[data-row="${row}"]`);
}

function renderCurrentInput() {
  for (let c = 0; c < state.wordLen; c++) {
    const tile = getTile(state.currentRow, c);
    const ch = state.currentInput[c] || '';
    tile.textContent = ch;
    tile.className = 'tile' + (ch ? ' filled' : '');
  }
}

// ── Guess Checking ────────────────────────────────────────────────────────────
function checkGuess(guess, secret) {
  const fb = Array(secret.length).fill('X');
  const secArr = secret.split('');
  const remaining = [];

  // Pass 1: exact matches
  for (let i = 0; i < secret.length; i++) {
    if (guess[i] === secArr[i]) {
      fb[i] = 'G';
      secArr[i] = null;
    } else {
      remaining.push(i);
    }
  }
  // Pass 2: wrong position
  remaining.forEach(i => {
    const idx = secArr.indexOf(guess[i]);
    if (idx !== -1) {
      fb[i] = 'Y';
      secArr[idx] = null;
    }
  });
  return fb;
}

// ── Key Handling ──────────────────────────────────────────────────────────────
function handleKey(key) {
  if (state.gameOver) return;
  if (key === '←') {
    if (state.currentInput.length > 0) {
      state.currentInput = state.currentInput.slice(0, -1);
      renderCurrentInput();
    }
  } else if (key === '↵') {
    submitGuess();
  } else if (/^[A-Z]$/.test(key) && state.currentInput.length < state.wordLen) {
    state.currentInput += key;
    renderCurrentInput();
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Backspace') { handleKey('←'); return; }
  if (e.key === 'Enter') { handleKey('↵'); return; }
  const ch = e.key.toUpperCase();
  if (/^[A-Z]$/.test(ch)) handleKey(ch);
});

// ── Submit ────────────────────────────────────────────────────────────────────
function submitGuess() {
  const guess = state.currentInput;
  if (guess.length < state.wordLen) {
    shakeRow(state.currentRow);
    showToast('Not enough letters');
    return;
  }
  const wordList = WORDS[state.wordLen];
  if (!wordList.includes(guess)) {
    shakeRow(state.currentRow);
    showToast('Not in word list');
    return;
  }

  const fb = checkGuess(guess, state.secret);
  state.guesses.push(guess);
  state.feedbacks.push(fb);

  revealRow(state.currentRow, guess, fb, () => {
    // Update key states
    for (let i = 0; i < guess.length; i++) {
      const ch = guess[i];
      const cur = state.keyStates[ch];
      const rank = { 'correct': 3, 'present': 2, 'absent': 1 };
      const newState = fb[i] === 'G' ? 'correct' : fb[i] === 'Y' ? 'present' : 'absent';
      if (!cur || rank[newState] > (rank[cur] || 0)) {
        state.keyStates[ch] = newState;
      }
    }
    updateKeyboard();

    const won = fb.every(f => f === 'G');
    if (won) {
      state.gameOver = true;
      state.won = true;
      setTimeout(() => bounceRow(state.currentRow), 100);
      setTimeout(() => showModal(true), 1600);
      spawnConfetti();
    } else {
      state.currentRow++;
      state.currentInput = '';
      if (state.currentRow >= 6) {
        state.gameOver = true;
        setTimeout(() => showModal(false), 500);
      }
    }
  });
}

// ── Animations ────────────────────────────────────────────────────────────────
function revealRow(row, guess, fb, onDone) {
  const classes = { G: 'correct', Y: 'present', X: 'absent' };
  for (let c = 0; c < state.wordLen; c++) {
    const tile = getTile(row, c);
    const delay = c * 300;
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => {
        tile.textContent = guess[c];
        tile.className = 'tile ' + classes[fb[c]];
      }, 150 + delay);
    }, delay);
  }
  setTimeout(onDone, state.wordLen * 300 + 200);
}

function bounceRow(row) {
  for (let c = 0; c < state.wordLen; c++) {
    const tile = getTile(row, c);
    setTimeout(() => tile.classList.add('bounce'), c * 100);
  }
}

function shakeRow(row) {
  const rowEl = getRow(row);
  rowEl.classList.remove('shake');
  void rowEl.offsetWidth;
  rowEl.classList.add('shake');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, duration = 1600) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(won) {
  const guessCount = state.guesses.length;
  if (won) {
    modalEmoji.textContent = guessCount === 1 ? '🏆' : guessCount <= 3 ? '🎉' : '😊';
    modalTitle.textContent = guessCount === 1 ? 'Genius!' : guessCount <= 3 ? 'Excellent!' : 'Nice job!';
    modalSub.textContent = `Solved in ${guessCount} ${guessCount === 1 ? 'guess' : 'guesses'}!`;
  } else {
    modalEmoji.textContent = '😔';
    modalTitle.textContent = 'Better luck next time!';
    modalSub.textContent = 'The word was:';
  }
  modalWord.textContent = state.secret;
  defineLink.href = `https://en.wiktionary.org/wiki/${state.secret.toLowerCase()}`;
  defineLink.textContent = `📖 Define "${state.secret}"`;
  modalBd.classList.add('visible');
}

modalBd.addEventListener('click', e => {
  if (e.target === modalBd) modalBd.classList.remove('visible');
});

playAgain.addEventListener('click', () => {
  modalBd.classList.remove('visible');
  newGame();
});

// ── Confetti ──────────────────────────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#a78bfa','#6d28d9','#538d4e','#b59f3b','#e2d9f3','#f472b6'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-12px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.setProperty('--dur', (1.2 + Math.random() * 1.4) + 's');
      el.style.width = el.style.height = (8 + Math.random() * 6) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 30);
  }
}

// ── New Game ──────────────────────────────────────────────────────────────────
function newGame() {
  const words = WORDS[state.wordLen];
  state.secret = words[Math.floor(Math.random() * words.length)];
  state.guesses = [];
  state.feedbacks = [];
  state.currentRow = 0;
  state.currentInput = '';
  state.gameOver = false;
  state.won = false;
  state.keyStates = {};
  buildBoard();
  buildKeyboard();
  modalBd.classList.remove('visible');
}

// ── Init ──────────────────────────────────────────────────────────────────────
newGame();
</script>
