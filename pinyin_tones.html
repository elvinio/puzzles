<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#13111c">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
<title>Pinyin Tones</title>
<style>
  :root {
    --bg: #13111a; --surface: #1e1b2e; --border: #2e2a45;
    --text: #e8e3f8; --muted: #7c7a99;
    --p-xl: #a78bfa; --p-lt: rgba(167,139,250,0.15);
    --tone1: #60a5fa; --tone2: #34d399; --tone3: #f59e0b; --tone4: #f87171;
    --active: rgba(167,139,250,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; min-height: 100vh; }

  header { padding: 20px 24px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.2rem; font-weight: 700; color: var(--p-xl); }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .mode-toggle {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px; flex-shrink: 0;
  }
  .mode-toggle button {
    padding: 4px 12px; border-radius: 16px; border: none; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: background 0.15s, color 0.15s;
    background: transparent; color: var(--muted);
  }
  .mode-toggle button.active { background: var(--p-xl); color: #13111a; }

  .initial-nav {
    position: sticky; top: 0; z-index: 11;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 8px 24px; display: flex; gap: 4px; overflow-x: auto;
    scrollbar-width: none;
  }
  .initial-nav::-webkit-scrollbar { display: none; }
  .initial-nav a {
    flex-shrink: 0; padding: 4px 9px; border-radius: 6px;
    font-size: 0.78rem; font-weight: 700; color: var(--muted);
    text-decoration: none; transition: background 0.12s, color 0.12s;
  }
  .initial-nav a:hover { background: var(--p-lt); color: var(--p-xl); }
  .initial-nav a.current { background: var(--p-lt); color: var(--p-xl); }

  .tone-bar {
    position: sticky; top: 37px; z-index: 10;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; align-items: center; gap: 10px;
  }
  .tone-bar span { font-size: 0.8rem; color: var(--muted); }
  .tone-indicator {
    display: flex; gap: 6px;
  }
  .tone-pip {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; opacity: 0.35;
    transition: opacity 0.1s, transform 0.1s;
    color: #fff;
  }
  .tone-pip.t1 { background: var(--tone1); }
  .tone-pip.t2 { background: var(--tone2); }
  .tone-pip.t3 { background: var(--tone3); }
  .tone-pip.t4 { background: var(--tone4); }
  .tone-pip.active { opacity: 1; transform: scale(1.15); }
  .tone-pip.clickable { cursor: pointer; }
  .tone-pip.clickable:hover { opacity: 0.8; transform: scale(1.08); }

  .current-label {
    margin-left: 12px; font-size: 0.9rem; color: var(--text); font-weight: 600; min-width: 80px;
  }

  main { padding: 20px 24px; }

  .group { margin-bottom: 24px; }
  .group-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 8px; padding-left: 2px;
  }
  .grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .syllable-btn {
    padding: 7px 12px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 0.88rem; cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    user-select: none;
  }
  .syllable-btn:hover { background: var(--p-lt); border-color: var(--p-xl); }
  .syllable-btn.playing { background: var(--active); border-color: var(--p-xl); transform: scale(1.05); }
  .syllable-btn.done { border-color: var(--p-xl); }
</style>
</head>
<body>

<header>
  <h1>Pinyin Tone Explorer</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--tone1)"></div>Tone 1 (flat)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tone2)"></div>Tone 2 (rising)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tone3)"></div>Tone 3 (dip)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tone4)"></div>Tone 4 (falling)</div>
  </div>
</header>

<nav class="initial-nav" id="initial-nav"></nav>

<div class="tone-bar">
  <span>Playing:</span>
  <div class="tone-indicator">
    <div class="tone-pip t1" id="pip1" onclick="playSingleTone(1)">1</div>
    <div class="tone-pip t2" id="pip2" onclick="playSingleTone(2)">2</div>
    <div class="tone-pip t3" id="pip3" onclick="playSingleTone(3)">3</div>
    <div class="tone-pip t4" id="pip4" onclick="playSingleTone(4)">4</div>
  </div>
  <div class="current-label" id="current-label">вҖ”</div>
  <div class="mode-toggle">
    <button id="btn-mp3" class="active" onclick="setMode('mp3')">MP3</button>
    <button id="btn-tts" onclick="setMode('tts')">TTS</button>
  </div>
</div>

<main id="main"></main>

function ttsCharFor(syllable, tone) {
  const row = TONE_CHAR[syllable];
  return row ? row[tone - 1] : null;
}

let _mode = 'mp3';
let _queue = [];
let _currentAudio = null;
let _activeSyllable = null;
let _currentSyllable = null;

function setMode(mode) {
  _mode = mode;
  document.getElementById('btn-mp3').classList.toggle('active', mode === 'mp3');
  document.getElementById('btn-tts').classList.toggle('active', mode === 'tts');
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  _queue = [];
  setPips(-1);
  if (_activeSyllable) { _activeSyllable.classList.remove('playing','done'); _activeSyllable = null; }
  document.getElementById('current-label').textContent = _currentSyllable || 'вҖ”';
}

function setPipsClickable(on) {
  [1,2,3,4].forEach(t => document.getElementById('pip'+t).classList.toggle('clickable', on));
}

function finishPlayback() {
  setPips(-1);
  if (_activeSyllable) { _activeSyllable.classList.remove('playing'); _activeSyllable.classList.add('done'); }
  document.getElementById('current-label').textContent = _currentSyllable || 'вҖ”';
}

function speakChar(char, onDone) {
  const utt = new SpeechSynthesisUtterance(char);
  utt.lang = 'zh-CN'; utt.rate = 0.7;
  utt.onend = onDone; utt.onerror = onDone;
  speechSynthesis.speak(utt);
}

function playSingleTone(tone) {
  if (!_currentSyllable) return;
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  _queue = [];
  setPips(tone);
  document.getElementById('current-label').textContent = _currentSyllable + ' В· ' + tone;
  const done = () => { setPips(-1); document.getElementById('current-label').textContent = _currentSyllable; };

  if (_mode === 'tts') {
    const char = ttsCharFor(_currentSyllable, tone);
    if (char) { speakChar(char, done); } else { setPips(-1); setTimeout(done, 600); }
  } else {
    const audio = new Audio(`pinyin_audio/${_currentSyllable}${tone}.mp3`);
    _currentAudio = audio;
    audio.onerror = () => { setPips(-1); document.getElementById('current-label').textContent = _currentSyllable; };
    audio.onended = () => { setPips(-1); document.getElementById('current-label').textContent = _currentSyllable; };
    audio.play().catch(() => { setPips(-1); });
  }
}

function playNext() {
  if (_queue.length === 0) { finishPlayback(); return; }
  const { tone, syllable } = _queue.shift();
  setPips(tone);
  document.getElementById('current-label').textContent = syllable + ' В· ' + tone;
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  const audio = new Audio(`pinyin_audio/${syllable}${tone}.mp3`);
  _currentAudio = audio;
  audio.onerror = () => playNext();
  audio.onended = () => playNext();
  audio.play().catch(() => playNext());
}

function playSyllableTTS(syllable) {
  speechSynthesis.cancel();
  const tones = [1, 2, 3, 4];
  let idx = 0;
  function next() {
    if (idx >= tones.length) { finishPlayback(); return; }
    const tone = tones[idx++];
    const char = ttsCharFor(syllable, tone);
    if (char) {
      setPips(tone);
      document.getElementById('current-label').textContent = syllable + ' В· ' + tone;
      speakChar(char, next);
    } else {
      setPips(-1);
      setTimeout(next, 600);
    }
  }
  next();
}

function setPips(tone) {
  [1,2,3,4].forEach(t => {
    document.getElementById('pip' + t).classList.toggle('active', t === tone);
  });
}

function playSyllable(syllable, btn) {
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (_activeSyllable) { _activeSyllable.classList.remove('playing','done'); }
  _activeSyllable = btn;
  _currentSyllable = syllable;
  btn.classList.add('playing');
  btn.classList.remove('done');
  setPipsClickable(true);
  if (_mode === 'tts') {
    playSyllableTTS(syllable);
  } else {
    _queue = [1,2,3,4].map(t => ({ tone: t, syllable }));
    playNext();
  }
}

// Build UI
const main = document.getElementById('main');
const nav = document.getElementById('initial-nav');

GROUPS.forEach(({ label, syllables }) => {
  const id = 'group-' + label.toLowerCase();

  // Nav link
  const a = document.createElement('a');
  a.href = '#' + id;
  a.textContent = label === 'Standalone' ? 'вҲ…' : label;
  a.dataset.group = id;
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.getElementById(id);
    const stickyH = document.getElementById('initial-nav').offsetHeight
                  + document.querySelector('.tone-bar').offsetHeight;
    const top = target.getBoundingClientRect().top + window.scrollY - stickyH - 8;
    window.scrollTo({ top, behavior: 'smooth' });
  });
  nav.appendChild(a);

  // Group section
  const group = document.createElement('div');
  group.className = 'group';
  group.id = id;
  const gl = document.createElement('div');
  gl.className = 'group-label';
  gl.textContent = label === 'Standalone' ? 'Standalone vowels' : `Initial: ${label}-`;
  group.appendChild(gl);
  const grid = document.createElement('div');
  grid.className = 'grid';
  syllables.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'syllable-btn';
    btn.textContent = s;
    btn.addEventListener('click', () => playSyllable(s, btn));
    grid.appendChild(btn);
  });
  group.appendChild(grid);
  main.appendChild(group);
});

// Highlight nav link for the group closest to top of viewport
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const link = nav.querySelector(`[data-group="${entry.target.id}"]`);
    if (link) link.classList.toggle('current', entry.isIntersecting);
  });
}, { rootMargin: '-20% 0px -75% 0px' });

document.querySelectorAll('.group').forEach(g => observer.observe(g));
