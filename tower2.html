<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SimTower 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #game { display: block; }
    #toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.7);
      border-top: 1px solid #3a3a3a;
    }
    .tool-btn {
      flex: 1;
      min-width: 44px;
      height: 44px;
      border: 2px solid #555;
      border-radius: 6px;
      background: #3a3a3a;
      color: #ccc;
      font-size: 9px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:hover { background: #4a4a4a; border-color: #888; }
    .tool-btn.active { border-color: #ffd700; background: #554400; color: #ffd700; }
    .tool-btn.destroy { border-color: #883333; color: #cc6666; }
    .tool-btn.destroy:hover { background: #4a1a1a; border-color: #cc4444; }
    .tool-btn.destroy.active { border-color: #ff6666; background: #551111; color: #ff9999; }
    .tool-btn.daynight { border-color: #667; color: #aab; flex: 0 0 44px; }
    .tool-btn.daynight.night { border-color: #446; background: #112244; color: #99aaff; }
    .tool-icon { font-size: 15px; line-height: 1; }
    .tool-label { font-size: 8px; line-height: 1; }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8.9.1/dist/pixi.min.js"></script>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const FLOOR_H        = 36;   // total floor band: 12px beam + 24px room
const BEAM_H         = 12;   // structural beam/slab at top of each floor band
const ROOM_H         = 24;   // usable room height (FLOOR_H - BEAM_H)
const CELL_W         = 8;
const TOOLBAR_H      = 60;
const GRID_COLS      = 250;
const MAX_FLOORS     = 100;
const MAX_BASEMENT   = 10;
const GROUND_MARGIN  = 80;
// World-space Y coordinate of the ground line (rooms use Y increasing downward)
const WORLD_GROUND_Y = MAX_FLOORS * FLOOR_H + 500; // 2900

const ROOM_DEFS = {
  lobby:  { widthCells: 32, heightFloors: 1, minFloor: 0,    maxFloor: 0,   color: 0x7A6040, label: 'Lobby'  },
  office: { widthCells:  9, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x3A6BC4, label: 'Office' },
  condo:  { widthCells: 16, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x2E8B57, label: 'Condo'  },
  single_hotel: { widthCells:  4, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x9B2335, label: 'Single Hotel' },
  twin_hotel:   { widthCells:  6, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0xC0503A, label: 'Twin Hotel'   },
  suite_hotel:  { widthCells: 10, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x7B3FA0, label: 'Suite Hotel'  },
  restaurant: { widthCells: 24, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0xD4622A, label: 'Restaurant' },
  cafe:       { widthCells: 16, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0xA0522D, label: 'Cafe'            },
  recycling:  { widthCells: 25, heightFloors: 2, minFloor: -MAX_BASEMENT, maxFloor: -2,  color: 0x4CAF50, label: 'Recycling Centre' },
  subway:      { widthCells: 30, heightFloors: 3, minFloor: -MAX_BASEMENT, maxFloor: -1,  color: 0x334466, label: 'Subway' },
  housekeeping:{ widthCells: 15, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x7090A0, label: 'Housekeeping' },
  security:    { widthCells: 16, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x405030, label: 'Security' },
  retail:       { widthCells: 12, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0xC47A20, label: 'Retail' },
  carpark_ramp: { widthCells: 16, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: -1,  color: 0x667788, label: 'Carpark Ramp' },
  carpark_lot:  { widthCells:  4, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: -1,  color: 0x778899, label: 'Carpark Lot'  },
  elevator:     { widthCells:  4, heightFloors: 1, minFloor: -MAX_BASEMENT, maxFloor: 999, color: 0x886644, label: 'Elevator'     },
};

// Sprite sheet atlas coordinates
const SINGLE_HOTEL_COL_SX = [0, 40, 80, 120, 160, 200, 240, 280, 320];
const SINGLE_HOTEL_ROW_SY = [0, 32];

// Restaurant: 4 conditions (cols) × 5 variants (rows), 1px top/bottom padding, 8px gaps
const RESTAURANT_COL_SX = [0, 200, 400, 600];
const RESTAURANT_ROW_SY = [1, 33, 65, 97, 129];

const CAFE_COL_SX = [0, 136, 272, 408];
const CAFE_ROW_SY = [0, 32, 64, 96, 128];

// Subway: 3 conditions in one row, frame 240×96, 8px gap between frames
const SUBWAY_COL_SX = [0, 248, 496];

// Recycling Centre: 7 conditions split across 2 rows (4 + 3), frame 200×60, gap col=8 row=12
// Row 0 (conditions 0-3): empty, low, low-medium, medium
// Row 1 (conditions 4-6): medium-full, full, truck clearing
const RECYCLING_COL_SX = [0, 208, 416, 624];
const RECYCLING_ROW_SY = [0, 72];

const RETAIL_COL_SX       = [8, 112, 216, 336, 440, 544];
const RETAIL_ROW_SY       = [8, 40, 72, 104, 136, 168];
const RETAIL_FOR_RENT_COL = 3;
const RETAIL_CLOSED_COL   = 4;
const RETAIL_SPECIAL_ROW  = 5;
const RETAIL_TYPE_COUNT   = 5;

const OFFICE_DAY_SX   = [8, 184];
const OFFICE_NIGHT_SX = [88, 264];
const OFFICE_ROW_SY   = [8, 40, 72];

const CONDO_ROW_SY = [8, 40, 72];
const CONDO_COL_SX = [8, 144, 280];

// Twin Hotel: 9 conditions (cols) × 4 variants (rows), no padding
// Conditions: 0=DayOcc 1=EveOcc 2=NightOcc 3=DayUnocc 4=NightUnocc 5=DayDirty 6=NightDirty 7=DayInfested 8=NightInfested
const TWIN_HOTEL_COL_SX  = [0, 56, 112, 168, 224, 280, 336, 392, 448];
const TWIN_HOTEL_ROW_SY  = [0, 32, 64, 96];

const SUITE_HOTEL_COL_SX = [0, 88, 176, 264, 352, 440, 528, 616, 704];
const SUITE_HOTEL_ROW_SY = [0, 32];

// ─── Game state ───────────────────────────────────────────────────────────────
const building = { rooms: [], nextId: 1 };

const SAVE_KEY = 'tower2_state';

function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ rooms: building.rooms, nextId: building.nextId }));
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const { rooms, nextId } = JSON.parse(raw);
    building.rooms = rooms;
    building.nextId = nextId;
    for (const room of rooms) createRoomSprite(room);
    const subwayRoom = building.rooms.find(r => r.type === 'subway');
    if (subwayRoom) createSubwayLine(subwayRoom);
  } catch (e) {
    console.warn('tower2: failed to load saved state', e);
  }
}
let tool      = 'office';
let gameHour  = 9;
let prevHourInt = 9;

let viewX = 0;
let viewY = 0;

let hoverCol = -1, hoverFloor = -999, mouseInCanvas = false;
let mouseDown = false, dragging = false;
let dragStartX = 0, dragStartY = 0, dragViewX = 0, dragViewY = 0;
let lastTouchMidX = 0, lastTouchMidY = 0, touchMoved = false, wasPanning = false;
let lobbyResizeState = null; // { room, end, startX, origCol, origWidth }

// ─── PixiJS scene objects ─────────────────────────────────────────────────────
let app;
let skyGraphics, groundGraphics, worldContainer, gridGraphics, roomLayer, beamLayer, subwayLineLayer, ghostGraphics, labelContainer;
let subwayLineTilingSprite = null;

const texCache      = {};           // key → PIXI.Texture
const roomSprites   = new Map();    // roomId → PIXI.Sprite
const beamSprites   = new Map();    // roomId → PIXI.TilingSprite
const elevatorParts = new Map();    // roomId → { container, car, motor, spring, shafts[] }
let   beamTex     = null;
const labelPool   = [];           // pooled PIXI.Text objects

let elevatorDragState = null;     // { room, end:'top'|'bottom' }

// ─── App size helpers ─────────────────────────────────────────────────────────
// With autoDensity:true, renderer.width/height are already in CSS pixels
function getAppW() { return app.renderer.width; }
function getAppH() { return app.renderer.height; }
function screenGroundY() { return getAppH() - GROUND_MARGIN + viewY; }

// ─── Grid math ────────────────────────────────────────────────────────────────
function screenToGrid(sx, sy) {
  const gY = screenGroundY();
  return {
    col:   Math.floor((sx + viewX) / CELL_W),
    floor: Math.floor((gY - sy) / FLOOR_H),
  };
}

function screenToGridRaw(sx, sy) {
  const gY = screenGroundY();
  return {
    col:   (sx + viewX) / CELL_W,
    floor: (gY - sy) / FLOOR_H,
  };
}

// Returns integer col/floor with ghost centered on cursor.
// For destroy, returns exact cell under cursor (no centering).
function resolveGridPos(sx, sy, type) {
  const raw = screenToGridRaw(sx, sy);
  if (type === 'destroy') return { col: Math.floor(raw.col), floor: Math.floor(raw.floor) };
  const def = ROOM_DEFS[type];
  const centCol   = raw.col   - (def ? def.widthCells  / 2 : 0);
  const centFloor = raw.floor - (def ? def.heightFloors / 2 : 0);
  return applySnap(centCol, centFloor, type);
}

function applySnap(rawCol, rawFloor, type) {
  const def = ROOM_DEFS[type];
  if (!def) return { col: Math.floor(rawCol), floor: Math.floor(rawFloor) };

  const SNAP_H = 8 / CELL_W;   // 1 cell
  const SNAP_V = 8 / FLOOR_H;

  let snapCol = rawCol, snapFloor = rawFloor;

  for (const room of building.rooms) {
    const rDef = ROOM_DEFS[room.type];
    const rW = room.widthCells ?? rDef.widthCells;
    const rH = rDef.heightFloors;

    if (Math.abs(rawCol - (room.col + rW)) < SNAP_H)               snapCol   = room.col + rW;
    if (Math.abs((rawCol + def.widthCells) - room.col) < SNAP_H)   snapCol   = room.col - def.widthCells;
    if (Math.abs(rawFloor - (room.floor + rH)) < SNAP_V)           snapFloor = room.floor + rH;
    if (Math.abs((rawFloor + def.heightFloors) - room.floor) < SNAP_V) snapFloor = room.floor - def.heightFloors;
  }

  return { col: Math.floor(snapCol), floor: Math.floor(snapFloor) };
}

function clampViewX(x) {
  const maxX = GRID_COLS * CELL_W - getAppW();
  return Math.max(0, Math.min(Math.max(0, maxX), x));
}

function clampViewY(y) {
  const minY = -MAX_BASEMENT * FLOOR_H;
  const maxY = MAX_FLOORS * FLOOR_H - (getAppH() - GROUND_MARGIN) + FLOOR_H * 4;
  return Math.max(minY, Math.min(Math.max(minY, maxY), y));
}

// Sync worldContainer transform to current viewX/viewY
function applyView() {
  worldContainer.x = -viewX;
  worldContainer.y = (getAppH() - GROUND_MARGIN + viewY) - WORLD_GROUND_Y;
}

// ─── Room logic ───────────────────────────────────────────────────────────────
function roomCells(room) {
  const def = ROOM_DEFS[room.type];
  const w = room.widthCells ?? def.widthCells;
  const cells = new Set();
  if (room.type === 'elevator') {
    for (let c = room.col; c < room.col + w; c++)
      for (let f = room.bottomFloor; f <= room.topFloor + 1; f++)
        cells.add(`${c},${f}`);
    return cells;
  }
  for (let c = room.col; c < room.col + w; c++)
    for (let f = room.floor; f < room.floor + def.heightFloors; f++)
      cells.add(`${c},${f}`);
  return cells;
}

function occupancySet(excludeId = -1) {
  const occ = new Set();
  for (const r of building.rooms) {
    if (r.id === excludeId) continue;
    for (const cell of roomCells(r)) occ.add(cell);
  }
  return occ;
}

function canPlace(type, col, floor, widthOverride) {
  const def = ROOM_DEFS[type];
  if (!def) return false;
  if (floor < def.minFloor || floor > def.maxFloor) return false;
  const w = widthOverride ?? def.widthCells;
  if (col < 0 || col + w > GRID_COLS) return false;
  // Elevator: shaft at floor, spring at floor-1, motor at floor+1; can coexist with rooms
  if (type === 'elevator') {
    if (floor - 1 < def.minFloor || floor + 1 > def.maxFloor) return false;
    const elevOcc = new Set();
    for (const r of building.rooms) {
      if (r.type !== 'elevator') continue;
      for (const cell of roomCells(r)) elevOcc.add(cell);
    }
    for (let c = col; c < col + w; c++)
      if (elevOcc.has(`${c},${floor-1}`) || elevOcc.has(`${c},${floor}`) || elevOcc.has(`${c},${floor+1}`)) return false;
    return true;
  }
  // Only one subway allowed
  if (type === 'subway' && building.rooms.some(r => r.type === 'subway')) return false;
  // Carpark ramp must start at B1 or directly below an existing ramp stack
  if (type === 'carpark_ramp' && floor !== -1 &&
      !building.rooms.some(r => r.type === 'carpark_ramp' && r.col === col && r.floor === floor + 1)) return false;
  // Nothing can be placed below an existing subway
  const existingSubway = building.rooms.find(r => r.type === 'subway');
  if (existingSubway && floor < existingSubway.floor) return false;
  const existingLobbyId = type === 'lobby' ? (building.rooms.find(r => r.type === 'lobby')?.id ?? -1) : -1;
  const occ = occupancySet(existingLobbyId);
  for (let c = col; c < col + w; c++)
    for (let f = floor; f < floor + def.heightFloors; f++)
      if (occ.has(`${c},${f}`)) return false;
  return true;
}

function tryExtendLobby(newCol) {
  const existing = building.rooms.find(r => r.type === 'lobby');
  if (!existing) return false;
  const newW = ROOM_DEFS.lobby.widthCells;
  const minCol = Math.min(existing.col, newCol);
  const maxCol = Math.max(existing.col + existing.widthCells, newCol + newW);
  const snappedWidth = Math.max(32, Math.round((maxCol - minCol) / 16) * 16);
  const snappedCol = Math.max(0, minCol);
  if (snappedCol + snappedWidth > GRID_COLS) return false;
  const occ = occupancySet(existing.id);
  for (let c = snappedCol; c < snappedCol + snappedWidth; c++)
    if (occ.has(`${c},0`)) return false;
  existing.col = snappedCol;
  existing.widthCells = snappedWidth;
  destroyRoomSprite(existing.id);
  const container = buildLobbyContainer(existing);
  roomLayer.addChild(container);
  roomSprites.set(existing.id, container);
  createBeamSprite(existing);
  saveState();
  return true;
}

function placeRoom(type, col, floor) {
  if (!canPlace(type, col, floor)) return false;
  const room = { id: building.nextId++, type, col, floor };
  if (type === 'lobby')  room.widthCells = 32;
  if (type === 'condo')  room.variant = Math.floor(Math.random() * 3);
  if (type === 'office') { room.colVar = Math.floor(Math.random() * 2); room.rowVar = Math.floor(Math.random() * 3); }
  if (type === 'recycling')  { room.fillLevel = 0; }
  if (type === 'subway')     { room.condition = 0; createSubwayLine(room); }
  if (type === 'restaurant') { room.variant = Math.floor(Math.random() * 5); room.open = true; room.crowdLevel = 0; }
  if (type === 'cafe')       { room.variant = Math.floor(Math.random() * 5); room.open = true; room.crowdLevel = 0; }
  if (type === 'retail')     { room.retailType = Math.floor(Math.random() * RETAIL_TYPE_COUNT); room.rented = true; }
  if (type === 'single_hotel') { room.variant = Math.floor(Math.random() * 2); room.occupied = true; room.dirty = false; room.infested = false; }
  if (type === 'twin_hotel')   { room.variant = Math.floor(Math.random() * 4); room.occupied = true; room.dirty = false; room.infested = false; }
  if (type === 'suite_hotel')  { room.variant = Math.floor(Math.random() * 2); room.occupied = true; room.dirty = false; room.infested = false; }
  if (type === 'carpark_lot')  { room.carVariant = Math.floor(Math.random() * 13) + 2; }
  if (type === 'elevator')    { room.bottomFloor = floor - 1; room.topFloor = floor; room.floor = floor - 1; room.carFloor = floor - 1; room.carTarget = floor; room.carPassengers = 0; }
  building.rooms.push(room);
  createRoomSprite(room);
  if (type === 'carpark_ramp') { refreshCarparkRampNeighbors(col, floor); refreshCarparkLotsOnFloor(floor); }
  if (type === 'carpark_lot')  refreshCarparkLotsOnFloor(floor);
  saveState();
  return true;
}

function deleteAt(col, floor) {
  const idx = building.rooms.findIndex(r => {
    const def = ROOM_DEFS[r.type];
    if (r.type === 'elevator')
      return col >= r.col && col < r.col + def.widthCells &&
             floor >= r.bottomFloor && floor <= r.topFloor + 1;
    return col >= r.col && col < r.col + def.widthCells &&
           floor >= r.floor && floor < r.floor + def.heightFloors;
  });
  if (idx !== -1) {
    const room = building.rooms[idx];
    if (room.type === 'subway') {
      if (subwayLineTilingSprite) {
        subwayLineTilingSprite.destroy();
        subwayLineTilingSprite = null;
      }
    }
    const { col: rc, floor: rf, type: rt } = room;
    destroyRoomSprite(room.id);
    building.rooms.splice(idx, 1);
    if (rt === 'carpark_ramp') { refreshCarparkRampNeighbors(rc, rf); refreshCarparkLotsOnFloor(rf); }
    if (rt === 'carpark_lot')  refreshCarparkLotsOnFloor(rf);
    saveState();
    return true;
  }
  return false;
}

// ─── Texture cache ────────────────────────────────────────────────────────────
function sliceTexture(base, sx, sy, sw, sh) {
  return new PIXI.Texture({ source: base.source, frame: new PIXI.Rectangle(sx, sy, sw, sh) });
}

function buildTextureCache(bases) {
  texCache['lobby_left']  = sliceTexture(bases.lobbyGround, 0,  0, 128, 36);
  texCache['lobby_mid']   = sliceTexture(bases.lobbyGround, 0, 36, 128, 36);
  texCache['lobby_right'] = sliceTexture(bases.lobbyGround, 0, 72, 128, 36);
  for (let cond = 0; cond < 9; cond++) {
    for (let variant = 0; variant < 2; variant++) {
      texCache[`single_hotel_${cond}_${variant}`] = sliceTexture(bases.hotelSingle, SINGLE_HOTEL_COL_SX[cond], SINGLE_HOTEL_ROW_SY[variant], 32, 24);
    }
  }

  for (let col = 0; col < 2; col++) {
    for (let row = 0; row < 3; row++) {
      texCache[`office_day_${col}_${row}`]   = sliceTexture(bases.office, OFFICE_DAY_SX[col],   OFFICE_ROW_SY[row], 72, 24);
      texCache[`office_night_${col}_${row}`] = sliceTexture(bases.office, OFFICE_NIGHT_SX[col], OFFICE_ROW_SY[row], 72, 24);
    }
  }

  for (let tod = 0; tod < 3; tod++) {
    for (let v = 0; v < 3; v++) {
      texCache[`condo_${tod}_${v}`] = sliceTexture(bases.condo, CONDO_COL_SX[tod], CONDO_ROW_SY[v], 128, 24);
    }
  }

  for (let col = 0; col < 6; col++) {
    for (let row = 0; row < 6; row++) {
      texCache[`retail_${col}_${row}`] = sliceTexture(bases.retail, RETAIL_COL_SX[col], RETAIL_ROW_SY[row], 96, 24);
    }
  }

  for (let cond = 0; cond < 9; cond++) {
    for (let variant = 0; variant < 4; variant++) {
      texCache[`twin_hotel_${cond}_${variant}`] = sliceTexture(bases.hotelTwin, TWIN_HOTEL_COL_SX[cond], TWIN_HOTEL_ROW_SY[variant], 48, 24);
    }
  }

  for (let cond = 0; cond < 9; cond++) {
    for (let variant = 0; variant < 2; variant++) {
      texCache[`suite_hotel_${cond}_${variant}`] = sliceTexture(bases.hotelSuite, SUITE_HOTEL_COL_SX[cond], SUITE_HOTEL_ROW_SY[variant], 80, 24);
    }
  }

  for (let cond = 0; cond < 4; cond++) {
    for (let variant = 0; variant < 5; variant++) {
      texCache[`restaurant_${cond}_${variant}`] = sliceTexture(bases.restaurant, RESTAURANT_COL_SX[cond], RESTAURANT_ROW_SY[variant], 192, 24);
    }
  }

  for (let cond = 0; cond < 4; cond++) {
    for (let variant = 0; variant < 5; variant++) {
      texCache[`cafe_${cond}_${variant}`] = sliceTexture(bases.cafe, CAFE_COL_SX[cond], CAFE_ROW_SY[variant], 128, 24);
    }
  }

  // Recycling: row 0 has 4 conditions, row 1 has 3 conditions
  for (let col = 0; col < 4; col++) texCache[`recycling_${col}`]   = sliceTexture(bases.recycling, RECYCLING_COL_SX[col], RECYCLING_ROW_SY[0], 200, 60);
  for (let col = 0; col < 3; col++) texCache[`recycling_${col+4}`] = sliceTexture(bases.recycling, RECYCLING_COL_SX[col], RECYCLING_ROW_SY[1], 200, 60);

  // Subway: 3 conditions, 240×96px frames
  for (let cond = 0; cond < 3; cond++) {
    texCache[`subway_${cond}`] = sliceTexture(bases.subway, SUBWAY_COL_SX[cond], 0, 240, 96);
  }
  texCache['subway_line']  = bases.subwayLine;
  texCache['housekeeping'] = bases.housekeeping;
  texCache['security']     = bases.security;
  // Carpark ramp: bottom/middle/top frames, each 128×24px with 8px gaps
  texCache['carpark_ramp_bottom'] = sliceTexture(bases.carparkRamp,   0, 0, 128, 24);
  texCache['carpark_ramp_middle'] = sliceTexture(bases.carparkRamp, 136, 0, 128, 24);
  texCache['carpark_ramp_top']    = sliceTexture(bases.carparkRamp, 272, 0, 128, 24);
  texCache['basement_bg'] = bases.basementBg;
  // Carpark lot: 15 frames × 32×24px with 8px gaps between frames
  for (let i = 0; i < 15; i++) {
    texCache[`carpark_lot_${i}`] = sliceTexture(bases.carparkLot, i * 40, 0, 32, 24);
  }
  // Elevator: 8 frames × 32×35px, 1px side padding, 8px gaps between frames
  // Frame layout: 0=empty car, 1-4=car with people, 5=motor, 6=spring, 7=shaft
  for (let i = 0; i < 8; i++) {
    texCache[`elevator_${i}`] = sliceTexture(bases.elevator, 1 + i * 40, 0, 32, 35);
  }
}

function createSubwayLine(room) {
  if (subwayLineTilingSprite) {
    subwayLineTilingSprite.destroy();
    subwayLineTilingSprite = null;
  }
  const W = GRID_COLS * CELL_W;
  const H = FLOOR_H;
  const y = WORLD_GROUND_Y - (room.floor + 1) * FLOOR_H;
  const sprite = new PIXI.TilingSprite({ texture: texCache['subway_line'], width: W, height: H });
  sprite.x = 0;
  sprite.y = y;
  subwayLineLayer.addChild(sprite);
  subwayLineTilingSprite = sprite;
}

function refreshCarparkRampNeighbors(col, floor) {
  for (const adjFloor of [floor - 1, floor + 1]) {
    const r = building.rooms.find(r => r.type === 'carpark_ramp' && r.col === col && r.floor === adjFloor);
    if (!r) continue;
    const s = roomSprites.get(r.id);
    if (s) s.texture = getRoomTexture(r);
  }
}

function refreshCarparkLotsOnFloor(floor) {
  for (const r of building.rooms) {
    if (r.type !== 'carpark_lot' || r.floor !== floor) continue;
    const s = roomSprites.get(r.id);
    if (s) s.texture = getRoomTexture(r);
  }
}

// BFS from a lot to see if any path of adjacent lots reaches a carpark_ramp
function isCarparkLotConnected(room) {
  const floor = room.floor;
  const lotW  = ROOM_DEFS.carpark_lot.widthCells;
  const lots  = building.rooms.filter(r => r.type === 'carpark_lot'  && r.floor === floor);
  const ramps = building.rooms.filter(r => r.type === 'carpark_ramp' && r.floor === floor);

  const visited = new Set([room.id]);
  const queue   = [room];

  while (queue.length > 0) {
    const cur = queue.shift();
    const cL  = cur.col, cR = cur.col + lotW;

    for (const ramp of ramps) {
      const rampW = ROOM_DEFS.carpark_ramp.widthCells;
      if (ramp.col + rampW === cL || ramp.col === cR) return true;
    }
    for (const lot of lots) {
      if (visited.has(lot.id)) continue;
      if (lot.col + lotW === cL || lot.col === cR) {
        visited.add(lot.id);
        queue.push(lot);
      }
    }
  }
  return false;
}

// ─── Elevator helpers ─────────────────────────────────────────────────────────
function getElevatorCarTexture(room) {
  const p = room.carPassengers ?? 0;
  if (p === 0)  return texCache['elevator_0'];
  if (p < 10)   return texCache['elevator_1'];
  if (p < 20)   return texCache['elevator_2'];
  if (p < 30)   return texCache['elevator_3'];
  return texCache['elevator_4'];
}

function buildElevatorSprites(room) {
  const old = elevatorParts.get(room.id);
  if (old) { roomLayer.removeChild(old.container); old.container.destroy({ children: true }); }

  const container = new PIXI.Container();
  const x = room.col * CELL_W, w = 4 * CELL_W, h = FLOOR_H;

  // Shaft structure at 29% opacity so rooms behind it remain visible
  const shaftContainer = new PIXI.Container();
  shaftContainer.alpha = 0.29;

  const spring = new PIXI.Sprite(texCache['elevator_6']);
  spring.x = x; spring.y = WORLD_GROUND_Y - (room.bottomFloor + 1) * FLOOR_H;
  spring.width = w; spring.height = h;
  shaftContainer.addChild(spring);

  const shafts = [];
  for (let f = room.bottomFloor + 1; f <= room.topFloor; f++) {
    const s = new PIXI.Sprite(texCache['elevator_7']);
    s.x = x; s.y = WORLD_GROUND_Y - (f + 1) * FLOOR_H;
    s.width = w; s.height = h;
    shaftContainer.addChild(s);
    shafts.push(s);
  }

  const motor = new PIXI.Sprite(texCache['elevator_5']);
  motor.x = x; motor.y = WORLD_GROUND_Y - (room.topFloor + 2) * FLOOR_H;
  motor.width = w; motor.height = h;
  shaftContainer.addChild(motor);

  container.addChild(shaftContainer);

  // Floor number labels — above shaft but below car
  for (let f = room.bottomFloor; f <= room.topFloor; f++) {
    const floorText = f === 0 ? 'G' : (f < 0 ? `B${-f}` : `${f}`);
    const label = new PIXI.Text({ text: floorText, style: { fontSize: 8, fontFamily: 'monospace', fill: 0xffffff } });
    label.anchor.set(0.5, 0.5);
    label.x = x + w / 2;
    label.y = WORLD_GROUND_Y - (f + 1) * FLOOR_H + BEAM_H + ROOM_H / 2;
    label.alpha = 0.75;
    container.addChild(label);
  }

  const car = new PIXI.Sprite(getElevatorCarTexture(room));
  car.x = x; car.y = WORLD_GROUND_Y - (room.carFloor + 1) * FLOOR_H;
  car.width = w; car.height = h;
  container.addChild(car);

  roomLayer.addChild(container);
  elevatorParts.set(room.id, { container, motor, spring, shafts, car });
}

function destroyElevatorSprites(roomId) {
  const parts = elevatorParts.get(roomId);
  if (!parts) return;
  roomLayer.removeChild(parts.container);
  parts.container.destroy({ children: true });
  elevatorParts.delete(roomId);
}

function findElevatorHandle(mx, my) {
  const g = screenToGrid(mx, my);
  for (const room of building.rooms) {
    if (room.type !== 'elevator') continue;
    if (g.col < room.col || g.col >= room.col + 4) continue;
    if (g.floor === room.topFloor + 1) return { room, end: 'top' };
    if (g.floor === room.bottomFloor)  return { room, end: 'bottom' };
  }
  return null;
}

function handleElevatorDrag(targetFloor) {
  if (!elevatorDragState) return;
  const { room, end } = elevatorDragState;
  let newTop = room.topFloor, newBottom = room.bottomFloor;

  if (end === 'top') {
    newTop = Math.max(room.bottomFloor, targetFloor - 1);
  } else {
    newBottom = Math.min(room.topFloor, targetFloor);
  }
  if (newTop === room.topFloor && newBottom === room.bottomFloor) return;

  const occ = occupancySet(room.id);
  for (let f = newBottom; f <= newTop + 1; f++)
    for (let c = room.col; c < room.col + 4; c++)
      if (occ.has(`${c},${f}`)) return;

  room.topFloor = newTop;
  room.bottomFloor = newBottom;
  room.floor = newBottom;
  room.carFloor  = Math.max(newBottom, Math.min(room.carFloor,  newTop));
  room.carTarget = Math.max(newBottom, Math.min(room.carTarget, newTop));
  buildElevatorSprites(room);
}

function condoTimeCol() {
  if (gameHour >= 6  && gameHour < 17) return 0;
  if (gameHour >= 17 && gameHour < 21) return 1;
  return 2;
}

function getRoomTexture(room) {
  switch (room.type) {
    case 'lobby':  return texCache['lobby'];
    case 'office': {
      const phase = (gameHour >= 6 && gameHour < 21) ? 'day' : 'night';
      return texCache[`office_${phase}_${room.colVar ?? 0}_${room.rowVar ?? 0}`];
    }
    case 'condo':
      return texCache[`condo_${condoTimeCol()}_${room.variant ?? 0}`];
    case 'recycling':
      return texCache[`recycling_${room.fillLevel ?? 0}`];
    case 'subway': {
      const isPeak = (gameHour >= 7 && gameHour < 9) || (gameHour >= 17 && gameHour < 19);
      const isNight = gameHour < 6 || gameHour >= 21;
      const cond = isPeak ? 2 : isNight ? 1 : 0;
      return texCache[`subway_${cond}`];
    }
    case 'housekeeping': return texCache['housekeeping'];
    case 'security':     return texCache['security'];
    case 'carpark_ramp': {
      const hasAbove = building.rooms.some(r => r.type === 'carpark_ramp' && r.col === room.col && r.floor === room.floor + 1);
      const hasBelow = building.rooms.some(r => r.type === 'carpark_ramp' && r.col === room.col && r.floor === room.floor - 1);
      const variant = (!hasAbove && hasBelow) ? 'top' : (hasAbove && !hasBelow) ? 'bottom' : hasAbove ? 'middle' : 'bottom';
      return texCache[`carpark_ramp_${variant}`];
    }
    case 'carpark_lot':
      return texCache[isCarparkLotConnected(room) ? `carpark_lot_${room.carVariant ?? 2}` : 'carpark_lot_1'];
    case 'restaurant':
    case 'cafe': {
      const cond = !room.open ? 3 : room.crowdLevel ?? 0;
      return texCache[`${room.type}_${cond}_${room.variant ?? 0}`];
    }
    case 'retail': {
      let col, row;
      if (!room.rented) {
        col = RETAIL_FOR_RENT_COL; row = RETAIL_SPECIAL_ROW;
      } else if (gameHour < 10) {
        col = RETAIL_CLOSED_COL; row = RETAIL_SPECIAL_ROW;
      } else {
        row = room.retailType ?? 0;
        col = gameHour < 12 ? 0 : gameHour < 18 ? 1 : 2;
      }
      return texCache[`retail_${col}_${row}`];
    }
    case 'single_hotel':
    case 'twin_hotel':
    case 'suite_hotel': {
      const isNight   = gameHour < 6 || gameHour >= 21;
      const isEvening = gameHour >= 17 && gameHour < 21;
      const variant   = room.variant ?? 0;
      let cond;
      if (room.infested) {
        cond = isNight ? 8 : 7;
      } else if (room.dirty) {
        cond = isNight ? 6 : 5;
      } else if (!room.occupied) {
        cond = isNight ? 4 : 3;
      } else {
        cond = isNight ? 2 : isEvening ? 1 : 0;
      }
      return texCache[`${room.type}_${cond}_${variant}`];
    }
  }
  return PIXI.Texture.EMPTY;
}

// ─── Lobby container assembly ─────────────────────────────────────────────────
function buildLobbyContainer(room) {
  const container = new PIXI.Container();
  const w = room.widthCells ?? 32;
  const numSegments = w / 16;
  const H  = FLOOR_H - BEAM_H;
  const SW = 16 * CELL_W;

  const left = new PIXI.Sprite(texCache['lobby_left']);
  left.width = SW; left.height = H; left.x = 0;
  container.addChild(left);

  for (let i = 1; i < numSegments - 1; i++) {
    const mid = new PIXI.Sprite(texCache['lobby_mid']);
    mid.width = SW; mid.height = H; mid.x = i * SW;
    container.addChild(mid);
  }

  const right = new PIXI.Sprite(texCache['lobby_right']);
  right.width = SW; right.height = H; right.x = (numSegments - 1) * SW;
  container.addChild(right);

  container.x = room.col * CELL_W;
  container.y = WORLD_GROUND_Y - (room.floor + 1) * FLOOR_H + BEAM_H;
  return container;
}

// ─── Room sprite management ───────────────────────────────────────────────────
function createRoomSprite(room) {
  if (room.type === 'elevator') {
    buildElevatorSprites(room);
    return;
  }
  if (room.type === 'lobby') {
    const container = buildLobbyContainer(room);
    roomLayer.addChild(container);
    roomSprites.set(room.id, container);
    createBeamSprite(room);
    return;
  }
  const def    = ROOM_DEFS[room.type];
  const sprite = new PIXI.Sprite(getRoomTexture(room));
  sprite.x      = room.col * CELL_W;
  sprite.y      = WORLD_GROUND_Y - (room.floor + def.heightFloors) * FLOOR_H + BEAM_H;
  sprite.width  = def.widthCells  * CELL_W;
  sprite.height = def.heightFloors * FLOOR_H - BEAM_H;
  roomLayer.addChild(sprite);
  roomSprites.set(room.id, sprite);
  createBeamSprite(room);
}

function destroyRoomSprite(roomId) {
  destroyElevatorSprites(roomId);
  const sprite = roomSprites.get(roomId);
  if (sprite) {
    roomLayer.removeChild(sprite);
    sprite.destroy();
    roomSprites.delete(roomId);
  }
  destroyBeamSprite(roomId);
}

function updateAllRoomTextures() {
  for (const room of building.rooms) {
    if (!['office', 'condo', 'retail', 'restaurant', 'cafe', 'recycling', 'single_hotel', 'twin_hotel', 'suite_hotel', 'subway'].includes(room.type)) continue;
    const sprite = roomSprites.get(room.id);
    if (sprite) sprite.texture = getRoomTexture(room);
  }
}

// ─── Sky & ground ─────────────────────────────────────────────────────────────
function drawSky() {
  const W = getAppW(), H = getAppH();
  const gY = screenGroundY();
  const isNight = gameHour < 6 || gameHour >= 21;
  skyGraphics.clear();
  try {
    const grad = new PIXI.FillGradient(0, 0, 0, Math.max(gY, 1));
    if (isNight) {
      grad.addColorStop(0,   0x020610);
      grad.addColorStop(0.5, 0x0A1428);
      grad.addColorStop(1,   0x1A2444);
    } else {
      grad.addColorStop(0,   0x2B6CB0);
      grad.addColorStop(0.4, 0x4A90D9);
      grad.addColorStop(0.8, 0x87CEEB);
      grad.addColorStop(1,   0xC8E8F8);
    }
    skyGraphics.rect(0, 0, W, H).fill(grad);
  } catch (_) {
    // Fallback if FillGradient is unavailable
    skyGraphics.rect(0, 0, W, H).fill(isNight ? 0x020610 : 0x2B6CB0);
  }
}

function drawGround() {
  const W  = getAppW(), H = getAppH();
  const gY = screenGroundY();
  groundGraphics.clear();
  if (gY < H) {
    groundGraphics.rect(0, gY, W, H - gY).fill(0x3A2810);
    groundGraphics.rect(0, gY, W, 5     ).fill(0x5C4020);
    groundGraphics.rect(0, gY, W, 2     ).fill(0x7A5530);
    groundGraphics.moveTo(0, gY).lineTo(W, gY)
                  .stroke({ width: 2, color: 0xB48C50, alpha: 0.6 });
  }
}

// ─── Grid lines (screen-space, redrawn with view) ─────────────────────────────
function drawGrid() {
  const W  = getAppW(), H = getAppH();
  const gY = screenGroundY();
  gridGraphics.clear();

}

// ─── Floor labels (screen-space) ─────────────────────────────────────────────
function updateFloorLabels() {
  const W  = getAppW(), H = getAppH();
  const gY = screenGroundY();

  for (const lbl of labelPool) lbl.visible = false;
  let poolIdx = 0;

  for (let f = -MAX_BASEMENT; f <= MAX_FLOORS; f++) {
    const y = gY - f * FLOOR_H;
    if (y < -FLOOR_H || y > H + FLOOR_H) continue;

    const text = f === 0 ? 'G' : (f < 0 ? `B${-f}` : `${f}`);

    let lbl = labelPool[poolIdx];
    if (!lbl) {
      lbl = new PIXI.Text({ text: '', style: { fontSize: 9, fontFamily: 'monospace', fill: 0xffffff } });
      lbl.alpha = 0.5;
      labelContainer.addChild(lbl);
      labelPool.push(lbl);
    }
    lbl.text = text;
    lbl.x    = W - 4;
    lbl.y    = y - 11;
    lbl.anchor.set(1, 0);
    lbl.visible = true;
    poolIdx++;

    // Tick mark beside the label
    gridGraphics.rect(W - 18, y - 0.5, 12, 1).fill({ color: 0xffffff, alpha: 0.5 });
  }
}

// ─── Ghost preview (world-space graphics inside worldContainer) ───────────────
function updateGhost() {
  ghostGraphics.clear();
  if (tool === 'destroy' || tool === 'select' || !mouseInCanvas || hoverFloor < -MAX_BASEMENT || dragging) return;
  const def = ROOM_DEFS[tool];
  if (!def) return;
  const valid = canPlace(tool, hoverCol, hoverFloor);
  const fillCol   = valid ? def.color : 0xcc2222;
  const strokeCol = valid ? 0xffffc8 : 0xff5555;
  if (tool === 'elevator') {
    // Draw spring below, shaft at hover, motor above
    for (const f of [hoverFloor - 1, hoverFloor, hoverFloor + 1]) {
      const wx = hoverCol * CELL_W, wy = WORLD_GROUND_Y - (f + 1) * FLOOR_H, dw = 4 * CELL_W;
      ghostGraphics.rect(wx, wy, dw, FLOOR_H).fill({ color: fillCol, alpha: 0.55 });
      ghostGraphics.rect(wx + 0.5, wy + 0.5, dw - 1, FLOOR_H - 1).stroke({ width: 1.5, color: strokeCol, alpha: 0.9 });
    }
    return;
  }
  const wx = hoverCol * CELL_W;
  const wy = WORLD_GROUND_Y - (hoverFloor + def.heightFloors) * FLOOR_H;
  const dw = def.widthCells  * CELL_W;
  const dh = def.heightFloors * FLOOR_H;
  ghostGraphics.rect(wx, wy, dw, dh)
               .fill({ color: fillCol, alpha: 0.55 });
  ghostGraphics.rect(wx + 0.5, wy + 0.5, dw - 1, dh - 1)
               .stroke({ width: 1.5, color: strokeCol, alpha: 0.9 });
}

// ─── Full visual refresh (call when view or sky changes) ──────────────────────
function refreshVisuals() {
  applyView();
  drawSky();
  drawGround();
  drawGrid();
  updateFloorLabels();
}

// ─── Lobby resize helpers ─────────────────────────────────────────────────────
function findLobbyResizeHandle(mx, my) {
  for (const room of building.rooms) {
    if (room.type !== 'lobby') continue;
    const w       = room.widthCells ?? 32;
    const gY      = screenGroundY();
    const topY    = gY - (room.floor + 1) * FLOOR_H;
    const bottomY = gY - room.floor * FLOOR_H;
    const leftX   = room.col * CELL_W - viewX;
    const rightX  = (room.col + w) * CELL_W - viewX;
    if (my < topY - 4 || my > bottomY + 4) continue;
    if (Math.abs(mx - leftX)  <= 8) return { room, end: 'left' };
    if (Math.abs(mx - rightX) <= 8) return { room, end: 'right' };
  }
  return null;
}

// ─── Input ────────────────────────────────────────────────────────────────────
function attachInput() {
  const canvas = app.canvas;

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  canvas.addEventListener('mousemove', e => {
    const r  = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    mouseInCanvas = true;

    // Elevator drag (select mode)
    if (elevatorDragState) {
      const g = screenToGrid(mx, my);
      handleElevatorDrag(g.floor);
      dragging = true;
      return;
    }

    // Lobby resize drag
    if (lobbyResizeState) {
      const { room, end, startX, origCol, origWidth } = lobbyResizeState;
      const dx = mx - startX;
      const deltaCells = Math.round(dx / CELL_W);
      let newCol = origCol, newWidth = origWidth;
      if (end === 'right') {
        newWidth = Math.max(32, Math.round((origWidth + deltaCells) / 16) * 16);
      } else {
        const colDelta = Math.round(deltaCells / 16) * 16;
        newCol   = Math.max(0, origCol + colDelta);
        newWidth = Math.max(32, Math.round((origWidth - (newCol - origCol)) / 16) * 16);
        if (newCol + newWidth !== origCol + origWidth) newCol = origCol + origWidth - newWidth;
        newCol = Math.max(0, newCol);
      }
      if (newCol >= 0 && newCol + newWidth <= GRID_COLS) {
        const occ = occupancySet(room.id);
        let valid = true;
        for (let c = newCol; c < newCol + newWidth; c++)
          if (occ.has(`${c},${room.floor}`)) { valid = false; break; }
        if (valid) {
          room.col = newCol;
          room.widthCells = newWidth;
          destroyRoomSprite(room.id);
          const container = buildLobbyContainer(room);
          roomLayer.addChild(container);
          roomSprites.set(room.id, container);
          createBeamSprite(room);
        }
      }
      return;
    }

    if (mouseDown) {
      const dx = mx - dragStartX, dy = my - dragStartY;
      if (!dragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) dragging = true;
      if (dragging) {
        viewX = clampViewX(dragViewX - dx);
        viewY = clampViewY(dragViewY - dy);
        refreshVisuals();
        return; // skip ghost update while dragging
      }
    }

    // Update cursor for lobby resize handles
    if (!mouseDown) {
      const handle = findLobbyResizeHandle(mx, my);
      canvas.style.cursor = handle ? 'ew-resize' : '';
    }

    const g = resolveGridPos(mx, my, tool);
    hoverCol = g.col; hoverFloor = g.floor;
    updateGhost();
  });

  canvas.addEventListener('mousedown', e => {
    const r = canvas.getBoundingClientRect();
    dragStartX = e.clientX - r.left; dragStartY = e.clientY - r.top;
    dragViewX = viewX; dragViewY = viewY;
    mouseDown = true; dragging = false;
    if (tool === 'select') {
      const elHandle = findElevatorHandle(dragStartX, dragStartY);
      if (elHandle) { elevatorDragState = { room: elHandle.room, end: elHandle.end }; return; }
    }
    const handle = findLobbyResizeHandle(dragStartX, dragStartY);
    if (handle) {
      lobbyResizeState = {
        room: handle.room, end: handle.end,
        startX: dragStartX,
        origCol: handle.room.col,
        origWidth: handle.room.widthCells ?? 32,
      };
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (elevatorDragState) {
      elevatorDragState = null;
      saveState();
      mouseDown = false; dragging = false;
      updateGhost();
      return;
    }
    if (lobbyResizeState) {
      lobbyResizeState = null;
      saveState();
      mouseDown = false; dragging = false;
      updateGhost();
      return;
    }
    if (!dragging) {
      const r  = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const effectiveTool = (e.button === 2) ? 'destroy' : tool;
      const g = resolveGridPos(mx, my, effectiveTool);
      if (effectiveTool === 'destroy') deleteAt(g.col, g.floor);
      else if (tool !== 'select') {
        if (tool === 'lobby' && building.rooms.some(r => r.type === 'lobby')) tryExtendLobby(g.col);
        else placeRoom(tool, g.col, g.floor);
      }
    }
    mouseDown = false; dragging = false;
    updateGhost();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    viewX = clampViewX(viewX + e.deltaX * 0.6);
    viewY = clampViewY(viewY - e.deltaY * 0.6);
    refreshVisuals();
    updateGhost();
  }, { passive: false });

  canvas.addEventListener('mouseenter', () => { mouseInCanvas = true; });
  canvas.addEventListener('mouseleave', () => {
    mouseInCanvas = false; mouseDown = false; dragging = false;
    lobbyResizeState = null; elevatorDragState = null;
    canvas.style.cursor = '';
    ghostGraphics.clear();
  });

  // ── Touch ──
  function touchMidpoint(touches) {
    if (touches.length === 1) return { x: touches[0].clientX, y: touches[0].clientY };
    return {
      x: (touches[0].clientX + touches[1].clientX) / 2,
      y: (touches[0].clientY + touches[1].clientY) / 2,
    };
  }

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const m = touchMidpoint(e.touches);
    lastTouchMidX = m.x - r.left;
    lastTouchMidY = m.y - r.top;
    dragViewX = viewX; dragViewY = viewY;
    touchMoved = false;

    if (e.touches.length >= 2) {
      lobbyResizeState = null;
      wasPanning = true;
      hoverFloor = -999;
      ghostGraphics.clear();
    } else {
      wasPanning = false;
      const t   = e.touches[0];
      const tmx = t.clientX - r.left, tmy = t.clientY - r.top;
      // Elevator handle (select mode)
      if (tool === 'select') {
        const elHandle = findElevatorHandle(tmx, tmy);
        if (elHandle) {
          elevatorDragState = { room: elHandle.room, end: elHandle.end };
          ghostGraphics.clear();
          return;
        }
      }
      // Check lobby edge first — takes priority over normal placement
      const handle = findLobbyResizeHandle(tmx, tmy);
      if (handle) {
        lobbyResizeState = {
          room: handle.room, end: handle.end,
          startX: tmx,
          origCol: handle.room.col,
          origWidth: handle.room.widthCells ?? 32,
        };
        ghostGraphics.clear();
      } else {
        lobbyResizeState = null;
        const g = resolveGridPos(tmx, tmy, tool);
        hoverCol = g.col; hoverFloor = g.floor;
        mouseInCanvas = true;
        updateGhost();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r  = canvas.getBoundingClientRect();
    const m  = touchMidpoint(e.touches);
    const mx = m.x - r.left, my = m.y - r.top;
    const dx = mx - lastTouchMidX, dy = my - lastTouchMidY;

    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchMoved = true;

    // Elevator drag (touch)
    if (elevatorDragState && e.touches.length === 1) {
      const t   = e.touches[0];
      const tmx = t.clientX - r.left, tmy = t.clientY - r.top;
      const g   = screenToGrid(tmx, tmy);
      handleElevatorDrag(g.floor);
      touchMoved = true;
      lastTouchMidX = mx; lastTouchMidY = my;
      return;
    }

    // Lobby resize drag (touch)
    if (lobbyResizeState && e.touches.length === 1) {
      const { room, end, startX, origCol, origWidth } = lobbyResizeState;
      const t   = e.touches[0];
      const tmx = t.clientX - r.left;
      const deltaCells = Math.round((tmx - startX) / CELL_W);
      let newCol = origCol, newWidth = origWidth;
      if (end === 'right') {
        newWidth = Math.max(32, Math.round((origWidth + deltaCells) / 16) * 16);
      } else {
        const colDelta = Math.round(deltaCells / 16) * 16;
        newCol   = Math.max(0, origCol + colDelta);
        newWidth = Math.max(32, Math.round((origWidth - (newCol - origCol)) / 16) * 16);
        if (newCol + newWidth !== origCol + origWidth) newCol = origCol + origWidth - newWidth;
        newCol = Math.max(0, newCol);
      }
      if (newCol >= 0 && newCol + newWidth <= GRID_COLS) {
        const occ = occupancySet(room.id);
        let valid = true;
        for (let c = newCol; c < newCol + newWidth; c++)
          if (occ.has(`${c},${room.floor}`)) { valid = false; break; }
        if (valid) {
          room.col = newCol; room.widthCells = newWidth;
          destroyRoomSprite(room.id);
          const container = buildLobbyContainer(room);
          roomLayer.addChild(container);
          roomSprites.set(room.id, container);
          createBeamSprite(room);
        }
      }
      lastTouchMidX = mx; lastTouchMidY = my;
      return;
    }

    if (e.touches.length >= 2) {
      viewX = clampViewX(viewX - dx);
      viewY = clampViewY(viewY + dy);
      lastTouchMidX = mx; lastTouchMidY = my;
      hoverFloor = -999;
      refreshVisuals();
      ghostGraphics.clear();
    } else if (e.touches.length === 1) {
      const t   = e.touches[0];
      const tmx = t.clientX - r.left, tmy = t.clientY - r.top;
      const g   = resolveGridPos(tmx, tmy, tool);
      hoverCol = g.col; hoverFloor = g.floor;
      mouseInCanvas = true;
      lastTouchMidX = mx; lastTouchMidY = my;
      updateGhost();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (elevatorDragState) {
      elevatorDragState = null;
      saveState();
      ghostGraphics.clear();
      if (e.touches.length === 0) { hoverFloor = -999; mouseInCanvas = false; }
      return;
    }
    if (lobbyResizeState) {
      lobbyResizeState = null;
      saveState();
      ghostGraphics.clear();
      if (e.touches.length === 0) { hoverFloor = -999; mouseInCanvas = false; }
      return;
    }
    if (!wasPanning && e.changedTouches.length === 1 && e.touches.length === 0) {
      const r   = canvas.getBoundingClientRect();
      const t   = e.changedTouches[0];
      const mx  = t.clientX - r.left, my = t.clientY - r.top;
      const g   = resolveGridPos(mx, my, tool);
      if (tool === 'destroy') deleteAt(g.col, g.floor);
      else if (tool !== 'select') {
        if (tool === 'lobby' && building.rooms.some(r => r.type === 'lobby')) tryExtendLobby(g.col);
        else placeRoom(tool, g.col, g.floor);
      }
    }
    if (e.touches.length === 0) {
      hoverFloor = -999;
      mouseInCanvas = false;
      ghostGraphics.clear();
    }
  }, { passive: false });
}

// ─── Toolbar ──────────────────────────────────────────────────────────────────
function attachToolbar() {
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    const select = () => {
      tool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateGhost();
    };
    btn.addEventListener('click', select);
    btn.addEventListener('touchend', e => { e.preventDefault(); select(); });
  });

  daynightBtn.addEventListener('click', toggleDayNight);
  daynightBtn.addEventListener('touchend', e => { e.preventDefault(); toggleDayNight(); });
}

// ─── Scene graph ──────────────────────────────────────────────────────────────
function buildScene() {
  skyGraphics    = new PIXI.Graphics();
  groundGraphics = new PIXI.Graphics();
  worldContainer = new PIXI.Container();
  gridGraphics   = new PIXI.Graphics();   // screen-space, NOT in worldContainer
  ghostGraphics  = new PIXI.Graphics();   // world-space, inside worldContainer
  roomLayer      = new PIXI.Container();
  labelContainer = new PIXI.Container();  // screen-space

  beamLayer = new PIXI.Container();
  subwayLineLayer = new PIXI.Container();

  // Basement background — tiled horizontally, full depth, behind everything
  const basementBgSprite = new PIXI.TilingSprite({
    texture: texCache['basement_bg'],
    width:   GRID_COLS * CELL_W,
    height:  MAX_BASEMENT * FLOOR_H,
  });
  basementBgSprite.x = 0;
  basementBgSprite.y = WORLD_GROUND_Y;
  worldContainer.addChild(basementBgSprite);

  worldContainer.addChild(subwayLineLayer);
  worldContainer.addChild(roomLayer);
  worldContainer.addChild(beamLayer);
  worldContainer.addChild(ghostGraphics);

  app.stage.addChild(skyGraphics);
  app.stage.addChild(groundGraphics);
  app.stage.addChild(worldContainer);
  app.stage.addChild(gridGraphics);
  app.stage.addChild(labelContainer);
}

function createBeamSprite(room) {
  const isLobby = room.type === 'lobby';
  const def = isLobby ? null : ROOM_DEFS[room.type];
  const w = (isLobby ? (room.widthCells ?? 32) : def.widthCells) * CELL_W;
  const heightFloors = isLobby ? 1 : def.heightFloors;
  const ts = new PIXI.TilingSprite({ texture: beamTex, width: w, height: BEAM_H });
  ts.x = room.col * CELL_W;
  ts.y = WORLD_GROUND_Y - (room.floor + heightFloors) * FLOOR_H;
  beamLayer.addChild(ts);
  beamSprites.set(room.id, ts);
}

function destroyBeamSprite(roomId) {
  const ts = beamSprites.get(roomId);
  if (ts) { beamLayer.removeChild(ts); ts.destroy(); beamSprites.delete(roomId); }
}

// ─── Game loop (ticker) ───────────────────────────────────────────────────────
function gameLoop(ticker) {
  // Advance time: 1 real minute = 1 in-game hour
  gameHour = (gameHour + ticker.deltaMS / 60000) % 24;
  const hourInt = Math.floor(gameHour);
  if (hourInt !== prevHourInt) {
    prevHourInt = hourInt;
    updateAllRoomTextures();
    drawSky();
    drawGround();
    updateDayNightButton();
  }

  // Animate elevator cars
  const dt = ticker.deltaMS / 1000;
  const EL_SPEED = 2; // floors per second
  for (const room of building.rooms) {
    if (room.type !== 'elevator') continue;
    const parts = elevatorParts.get(room.id);
    if (!parts) continue;
    const range = room.topFloor - room.bottomFloor;
    if (range <= 0) continue;
    const diff = room.carTarget - room.carFloor;
    if (Math.abs(diff) <= EL_SPEED * dt) {
      room.carFloor = room.carTarget;
      room.carTarget = room.carFloor <= room.bottomFloor ? room.topFloor :
                       room.carFloor >= room.topFloor    ? room.bottomFloor :
                       (Math.random() < 0.5 ? room.bottomFloor : room.topFloor);
    } else {
      room.carFloor += Math.sign(diff) * EL_SPEED * dt;
    }
    parts.car.y = WORLD_GROUND_Y - (room.carFloor + 1) * FLOOR_H;
  }
}

// ─── Error overlay ────────────────────────────────────────────────────────────
function showError(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#111;color:#f88;font-family:monospace;font-size:13px;padding:20px;white-space:pre-wrap;z-index:999;overflow:auto;';
  div.textContent = 'SimTower failed to load:\n\n' + msg;
  document.body.appendChild(div);
}

// ─── Async init ───────────────────────────────────────────────────────────────
(async () => {
  try {
    app = new PIXI.Application();
    await app.init({
      width:           window.innerWidth,
      height:          window.innerHeight - TOOLBAR_H,
      backgroundColor: 0x020610,
      antialias:       false,
      resolution:      window.devicePixelRatio || 1,
      autoDensity:     true,
    });

    app.canvas.id = 'game';
    document.body.insertBefore(app.canvas, document.getElementById('toolbar'));

    // Load all sprite sheets — catch individually so we can report which one failed
    const assetNames = [
      'tower/ground_lobby.png',
      'tower/Office.png',
      'tower/Condos.png',
      'tower/Retail.png',
      'tower/hotel_single.png',
      'tower/hotel_twin.png',
      'tower/hotel_suite.png',
      'tower/restaurant.png',
      'tower/cafe.png',
      'tower/recycle.png',
      'tower/beam.png',
      'tower/subway.png',
      'tower/subway_line.png',
      'tower/housekeeping.png',
      'tower/security.png',
      'tower/carpark_ramp.png',
      'tower/basement_bg.png',
      'tower/carpark_lot.png',
      'tower/elevator.png',
    ];
    const [lobbyGroundTex, officeTex, condoTex, retailTex, hotelSingleTex, hotelTwinTex, hotelSuiteTex, restaurantTex, cafeTex, recyclingTex, beamTexLoaded, subwayTex, subwayLineTex, housekeepingTex, securityTex, carparkRampTex, basementBgTex, carparkLotTex, elevatorTex] =
      await Promise.all(assetNames.map(name =>
        PIXI.Assets.load(name).catch(e => { throw new Error(`Failed to load "${name}": ${e.message ?? e}`); })
      ));

    beamTex = beamTexLoaded;
    buildTextureCache({ lobbyGround: lobbyGroundTex, office: officeTex, condo: condoTex, retail: retailTex, hotelSingle: hotelSingleTex, hotelTwin: hotelTwinTex, hotelSuite: hotelSuiteTex, restaurant: restaurantTex, cafe: cafeTex, recycling: recyclingTex, subway: subwayTex, subwayLine: subwayLineTex, housekeeping: housekeepingTex, security: securityTex, carparkRamp: carparkRampTex, basementBg: basementBgTex, carparkLot: carparkLotTex, elevator: elevatorTex });

    buildScene();
    loadState();
    refreshVisuals();

    attachInput();
    attachToolbar();

    app.ticker.add(gameLoop);

    window.addEventListener('resize', () => {
      app.renderer.resize(window.innerWidth, window.innerHeight - TOOLBAR_H);
      refreshVisuals();
    });
  } catch (err) {
    console.error('SimTower init error:', err);
    showError(String(err?.stack ?? err));
  }
})();
</script>
