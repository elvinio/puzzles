<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #13111c;
      --surface: #1c1730;
      --brd: #4c1d95;
      --p: #6d28d9;
      --p-lt: #7c3aed;
      --p-xl: #a78bfa;
      --p-text: #e2d9f3;
      --muted: #7c6fa0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      color: var(--p-text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 12px 16px 40px;
      gap: 20px;
      touch-action: manipulation;
      user-select: none;
    }

    .topbar {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      flex-shrink: 0;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--p-xl);
    }

    h1 {
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 900;
      color: var(--p-xl);
      letter-spacing: 0.04em;
    }

    .content {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface);
      border: 2px solid var(--brd);
      border-radius: 12px;
      padding: 20px 12px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .card:active {
      background: #2a1f50;
      border-color: var(--p-lt);
      transform: scale(0.97);
    }

    .card-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 800;
      color: #c4b5fd;
      text-align: center;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-link">← Back</a>
    <h1>Science</h1>
  </div>

  <div class="content">
    <div class="grid">
      <a class="card" href="science/photodiode.html" onclick="window.location.href='science/photodiode.html';return false;">
        <div class="card-icon">💡</div>
        <div class="card-title">Photodiode</div>
        <div class="card-desc">How It Works — Interactive explanation of photodiodes</div>
      </a>
    </div>
  </div>

</body>
</html>
