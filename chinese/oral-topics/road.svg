<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 过马路 Crossing the road: children cross at the zebra crossing while the green man
       shows; one boy looks at his phone while crossing; a car waits at the line. -->
  <rect width="1200" height="800" fill="#cdeafd"/>
  <!-- buildings -->
  <g>
    <rect x="40" y="150" width="180" height="300" fill="#b7a6d9"/>
    <rect x="240" y="100" width="150" height="350" fill="#9db8d6"/>
    <rect x="820" y="130" width="170" height="320" fill="#f0b8a0"/>
    <rect x="1010" y="90" width="150" height="360" fill="#a8c8a0"/>
    <g fill="#fdf6e6">
      <rect x="65" y="180" width="36" height="40"/><rect x="125" y="180" width="36" height="40"/>
      <rect x="65" y="250" width="36" height="40"/><rect x="125" y="250" width="36" height="40"/>
      <rect x="65" y="320" width="36" height="40"/><rect x="125" y="320" width="36" height="40"/>
      <rect x="262" y="130" width="32" height="36"/><rect x="318" y="130" width="32" height="36"/>
      <rect x="262" y="196" width="32" height="36"/><rect x="318" y="196" width="32" height="36"/>
      <rect x="262" y="262" width="32" height="36"/><rect x="318" y="262" width="32" height="36"/>
      <rect x="262" y="328" width="32" height="36"/><rect x="318" y="328" width="32" height="36"/>
      <rect x="845" y="160" width="34" height="38"/><rect x="905" y="160" width="34" height="38"/>
      <rect x="845" y="230" width="34" height="38"/><rect x="905" y="230" width="34" height="38"/>
      <rect x="845" y="300" width="34" height="38"/><rect x="905" y="300" width="34" height="38"/>
      <rect x="1032" y="120" width="32" height="36"/><rect x="1090" y="120" width="32" height="36"/>
      <rect x="1032" y="186" width="32" height="36"/><rect x="1090" y="186" width="32" height="36"/>
      <rect x="1032" y="252" width="32" height="36"/><rect x="1090" y="252" width="32" height="36"/>
    </g>
  </g>
  <!-- pavement + road -->
  <rect y="450" width="1200" height="60" fill="#d8d3c8"/>
  <rect y="510" width="1200" height="230" fill="#5c6470"/>
  <rect y="740" width="1200" height="60" fill="#d8d3c8"/>
  <!-- zebra crossing -->
  <g fill="#f2f2f2">
    <rect x="420" y="520" width="70" height="210" rx="6"/>
    <rect x="520" y="520" width="70" height="210" rx="6"/>
    <rect x="620" y="520" width="70" height="210" rx="6"/>
    <rect x="720" y="520" width="70" height="210" rx="6"/>
  </g>

  <!-- traffic light with green man -->
  <g>
    <rect x="330" y="290" width="14" height="220" fill="#4a4a58"/>
    <rect x="300" y="200" width="76" height="120" rx="12" fill="#333a44"/>
    <circle cx="338" cy="232" r="20" fill="#6b2222"/>
    <circle cx="338" cy="284" r="20" fill="#38d05c"/>
    <!-- little green man -->
    <circle cx="338" cy="277" r="4.5" fill="#0b3d1c"/>
    <path d="M338,281 L338,291 M338,283 L331,289 M338,283 L345,289 M338,291 L332,298 M338,291 L344,298" stroke="#0b3d1c" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- waiting car -->
  <g transform="translate(120,600)">
    <rect x="0" y="14" width="220" height="60" rx="18" fill="#e2574c"/>
    <path d="M40,16 Q60,-24 110,-24 Q160,-24 180,16 Z" fill="#e2574c"/>
    <path d="M56,12 Q70,-14 106,-14 L106,12 Z" fill="#bde3f8"/>
    <path d="M116,12 L116,-14 Q152,-14 166,12 Z" fill="#bde3f8"/>
    <circle cx="50" cy="78" r="24" fill="#333"/>
    <circle cx="50" cy="78" r="10" fill="#aaa"/>
    <circle cx="170" cy="78" r="24" fill="#333"/>
    <circle cx="170" cy="78" r="10" fill="#aaa"/>
    <rect x="212" y="30" width="12" height="16" rx="4" fill="#ffd35c"/>
  </g>

  <!-- girl crossing, looking ahead, hand raised -->
  <g transform="translate(530,560)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#4a2f18"/>
    <circle cx="0" cy="17" r="21" fill="#f6c9a0"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#4a2f18"/>
    <circle cx="-16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <path d="M-6,27 Q0,32 6,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-22,38 L22,38 L28,88 L-28,88 Z" fill="#ffd35c"/>
    <!-- one hand raised high (crossing safely) -->
    <path d="M16,44 L34,-14" stroke="#ffd35c" stroke-width="10" stroke-linecap="round"/>
    <circle cx="36" cy="-20" r="8" fill="#f6c9a0"/>
    <path d="M-16,44 L-30,76" stroke="#ffd35c" stroke-width="10" stroke-linecap="round"/>
    <path d="M-8,88 L-20,120" stroke="#f6c9a0" stroke-width="11" stroke-linecap="round"/>
    <path d="M8,88 L22,116" stroke="#f6c9a0" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="-24" cy="126" rx="11" ry="7" fill="#e05780"/>
    <ellipse cx="26" cy="122" rx="11" ry="7" fill="#e05780"/>
  </g>

  <!-- boy crossing while staring at his phone (the danger) -->
  <g transform="translate(660,565)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#2c2c2c"/>
    <circle cx="0" cy="18" r="22" fill="#c98d5f"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#2c2c2c"/>
    <!-- eyes looking down -->
    <circle cx="-8" cy="20" r="2.6" fill="#333"/>
    <circle cx="8" cy="20" r="2.6" fill="#333"/>
    <path d="M-5,30 L5,30" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <rect x="-20" y="40" width="40" height="52" rx="12" fill="#4f77b0"/>
    <!-- both hands holding phone in front, head bent toward it -->
    <path d="M-18,50 L-10,74" stroke="#4f77b0" stroke-width="10" stroke-linecap="round"/>
    <path d="M18,50 L10,74" stroke="#4f77b0" stroke-width="10" stroke-linecap="round"/>
    <rect x="-14" y="66" width="28" height="20" rx="4" fill="#31456b"/>
    <rect x="-11" y="69" width="22" height="14" rx="2" fill="#8fd0ff"/>
    <path d="M-8,92 L-18,124" stroke="#4a4a58" stroke-width="13" stroke-linecap="round"/>
    <path d="M8,92 L20,120" stroke="#4a4a58" stroke-width="13" stroke-linecap="round"/>
    <ellipse cx="-22" cy="130" rx="12" ry="7" fill="#fff"/>
    <ellipse cx="24" cy="126" rx="12" ry="7" fill="#fff"/>
    <!-- warning sparks -->
    <path d="M30,4 L42,-6 M34,16 L50,12" stroke="#e05780" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- mother with small child waiting on the far pavement -->
  <g transform="translate(1000,470)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#3b2a1c"/>
    <circle cx="0" cy="18" r="22" fill="#f2c396"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#3b2a1c"/>
    <path d="M-22,12 Q-30,40 -20,58 L-14,18 Z" fill="#3b2a1c"/>
    <circle cx="-8" cy="16" r="2.6" fill="#333"/>
    <circle cx="8" cy="16" r="2.6" fill="#333"/>
    <path d="M-7,27 Q0,33 7,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-24,40 L24,40 L30,104 L-30,104 Z" fill="#9b6dd6"/>
    <path d="M-20,52 L-34,84" stroke="#9b6dd6" stroke-width="10" stroke-linecap="round"/>
    <!-- holding the child's hand -->
    <path d="M20,52 L42,86" stroke="#9b6dd6" stroke-width="10" stroke-linecap="round"/>
    <rect x="-13" y="104" width="11" height="26" rx="5" fill="#f2c396"/>
    <rect x="3" y="104" width="11" height="26" rx="5" fill="#f2c396"/>
    <ellipse cx="-8" cy="134" rx="10" ry="6" fill="#5c5c6e"/>
    <ellipse cx="9" cy="134" rx="10" ry="6" fill="#5c5c6e"/>
  </g>
  <g transform="translate(1062,530) scale(0.72)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#151515"/>
    <circle cx="0" cy="17" r="21" fill="#e8b48a"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#151515"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <path d="M-6,27 Q0,32 6,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-19" y="38" width="38" height="48" rx="12" fill="#4fb0a5"/>
    <!-- hand up holding mum's hand -->
    <path d="M-16,46 L-26,-4" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M16,46 L26,76" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <rect x="-15" y="86" width="12" height="32" rx="6" fill="#6b4f3a"/>
    <rect x="3" y="86" width="12" height="32" rx="6" fill="#6b4f3a"/>
    <ellipse cx="-9" cy="122" rx="11" ry="7" fill="#fff"/>
    <ellipse cx="9" cy="122" rx="11" ry="7" fill="#fff"/>
  </g>

  <!-- sun -->
  <circle cx="620" cy="80" r="48" fill="#ffd35c"/>
</svg>
