<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 帮忙做家务 Helping at home: girl sweeping the floor, boy watering the plant,
       mum carrying the laundry basket, and the cat watching. -->
  <rect width="1200" height="800" fill="#fbf3e4"/>
  <rect y="600" width="1200" height="200" fill="#d9b98f"/>
  <rect y="592" width="1200" height="10" fill="#c7a578"/>
  <path d="M0,600 L1200,600" stroke="#c7a578" stroke-width="4"/>
  <g stroke="#cfae82" stroke-width="3">
    <path d="M150,640 L1050,640 M80,690 L1120,690 M150,740 L1050,740"/>
  </g>

  <!-- window with curtains -->
  <rect x="90" y="110" width="260" height="200" rx="10" fill="#bde3f8" stroke="#8a99ac" stroke-width="8"/>
  <path d="M220,110 L220,310 M90,210 L350,210" stroke="#8a99ac" stroke-width="5"/>
  <circle cx="150" cy="160" r="24" fill="#ffd35c"/>
  <path d="M300,255 L340,235 L340,290 Z" fill="#96d06e" opacity="0"/>
  <path d="M78,100 q30,110 0,220 L60,320 L60,100 Z" fill="#f0a8b8"/>
  <path d="M362,100 q-30,110 0,220 L380,320 L380,100 Z" fill="#f0a8b8"/>

  <!-- family photo on the wall -->
  <rect x="520" y="120" width="150" height="110" rx="8" fill="#ffffff" stroke="#a5713f" stroke-width="8"/>
  <circle cx="565" cy="165" r="16" fill="#f6c9a0"/>
  <circle cx="625" cy="165" r="16" fill="#c98d5f"/>
  <path d="M545,196 q50,26 100,0" stroke="#7f9cc4" stroke-width="10" fill="none"/>

  <!-- sofa -->
  <g>
    <rect x="760" y="420" width="330" height="120" rx="20" fill="#7f9cc4"/>
    <rect x="740" y="380" width="60" height="140" rx="18" fill="#6c89b1"/>
    <rect x="1050" y="380" width="60" height="140" rx="18" fill="#6c89b1"/>
    <rect x="780" y="360" width="290" height="70" rx="16" fill="#6c89b1"/>
    <rect x="800" y="530" width="20" height="60" fill="#5c5c6e"/>
    <rect x="1030" y="530" width="20" height="60" fill="#5c5c6e"/>
    <rect x="820" y="400" width="70" height="56" rx="12" fill="#ffd35c"/>
  </g>

  <!-- girl sweeping, dust pile -->
  <g transform="translate(300,440)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#4a2f18"/>
    <circle cx="0" cy="17" r="21" fill="#f6c9a0"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#4a2f18"/>
    <circle cx="-16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <path d="M-6,27 Q0,32 6,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-22,38 L22,38 L28,92 L-28,92 Z" fill="#ef6461"/>
    <!-- two hands on the broom -->
    <path d="M-18,48 L-46,68" stroke="#ef6461" stroke-width="10" stroke-linecap="round"/>
    <path d="M18,48 L-24,92" stroke="#ef6461" stroke-width="10" stroke-linecap="round"/>
    <path d="M-52,50 L-84,140" stroke="#a5713f" stroke-width="7" stroke-linecap="round"/>
    <path d="M-84,140 L-120,168 L-70,168 Z" fill="#e2b13c"/>
    <path d="M-112,168 L-114,180 M-100,168 L-101,182 M-88,168 L-88,182 M-77,168 L-75,180" stroke="#c99a2e" stroke-width="4" stroke-linecap="round"/>
    <rect x="-12" y="92" width="11" height="30" rx="5" fill="#f6c9a0"/>
    <rect x="4" y="92" width="11" height="30" rx="5" fill="#f6c9a0"/>
    <ellipse cx="-7" cy="126" rx="11" ry="7" fill="#e05780"/>
    <ellipse cx="10" cy="126" rx="11" ry="7" fill="#e05780"/>
  </g>
  <!-- dust pile -->
  <g fill="#b0a493">
    <circle cx="150" cy="608" r="7"/><circle cx="168" cy="612" r="6"/><circle cx="158" cy="598" r="5"/>
    <circle cx="182" cy="604" r="4.5"/>
  </g>

  <!-- boy watering the plant -->
  <g transform="translate(600,450)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#2c2c2c"/>
    <circle cx="0" cy="17" r="21" fill="#c98d5f"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#2c2c2c"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <path d="M-6,27 Q0,32 6,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-20" y="38" width="40" height="52" rx="12" fill="#4fb0a5"/>
    <!-- both hands tilting a watering can -->
    <path d="M18,48 L48,58" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M-18,48 L-8,80" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(66,52) rotate(24)">
      <rect x="-16" y="-2" width="40" height="30" rx="8" fill="#5f9e5f"/>
      <path d="M24,6 L48,-6" stroke="#5f9e5f" stroke-width="8" stroke-linecap="round"/>
      <path d="M-14,4 q-14,10 0,20" stroke="#5f9e5f" stroke-width="6" fill="none"/>
    </g>
    <path d="M116,42 L112,58 M126,44 L124,60 M136,48 L134,62" stroke="#6fc3e8" stroke-width="4.5" stroke-linecap="round"/>
    <rect x="-16" y="90" width="13" height="36" rx="6" fill="#4a4a58"/>
    <rect x="3" y="90" width="13" height="36" rx="6" fill="#4a4a58"/>
    <ellipse cx="-10" cy="130" rx="12" ry="7" fill="#fff"/>
    <ellipse cx="10" cy="130" rx="12" ry="7" fill="#fff"/>
  </g>
  <!-- potted plant -->
  <g transform="translate(760,540)">
    <path d="M-30,10 L30,10 L20,60 L-20,60 Z" fill="#c9764a"/>
    <path d="M0,10 Q-4,-30 -30,-46 M0,10 Q4,-34 28,-52 M0,10 Q0,-44 -4,-64" stroke="#5f9e5f" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="-32" cy="-50" rx="12" ry="8" fill="#6fbe58" transform="rotate(-30 -32 -50)"/>
    <ellipse cx="30" cy="-56" rx="12" ry="8" fill="#6fbe58" transform="rotate(30 30 -56)"/>
    <ellipse cx="-5" cy="-68" rx="12" ry="8" fill="#6fbe58" transform="rotate(-8 -5 -68)"/>
  </g>

  <!-- mum carrying laundry basket -->
  <g transform="translate(980,590)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#3b2a1c"/>
    <circle cx="0" cy="18" r="22" fill="#f2c396"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#3b2a1c"/>
    <path d="M-22,12 Q-30,40 -20,58 L-14,18 Z" fill="#3b2a1c"/>
    <circle cx="-8" cy="16" r="2.6" fill="#333"/>
    <circle cx="8" cy="16" r="2.6" fill="#333"/>
    <path d="M-7,27 Q0,33 7,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-24,40 L24,40 L30,108 L-30,108 Z" fill="#9b6dd6"/>
    <!-- both arms forward holding the basket -->
    <path d="M-20,52 L-52,72" stroke="#9b6dd6" stroke-width="10" stroke-linecap="round"/>
    <path d="M20,52 L-14,80" stroke="#9b6dd6" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(-72,62)">
      <path d="M-34,0 L34,0 L26,44 L-26,44 Z" fill="#e2b13c"/>
      <path d="M-30,8 L30,8 M-29,18 L29,18 M-28,28 L28,28" stroke="#c99a2e" stroke-width="3"/>
      <path d="M-20,-2 q8,-16 18,-2 q10,-14 20,0" fill="#ffffff"/>
      <path d="M-24,-4 q-6,-12 4,-14" stroke="#6fc3e8" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>
    <rect x="-13" y="108" width="11" height="26" rx="5" fill="#f2c396"/>
    <rect x="4" y="108" width="11" height="26" rx="5" fill="#f2c396"/>
    <ellipse cx="-8" cy="138" rx="10" ry="6" fill="#5c5c6e"/>
    <ellipse cx="9" cy="138" rx="10" ry="6" fill="#5c5c6e"/>
  </g>

  <!-- cat watching from the sofa -->
  <g transform="translate(950,400)">
    <ellipse cx="0" cy="16" rx="34" ry="20" fill="#f4a83c"/>
    <circle cx="34" cy="0" r="17" fill="#f4a83c"/>
    <path d="M24,-12 L20,-28 L33,-19 Z" fill="#d8892b"/>
    <path d="M44,-12 L48,-28 L35,-19 Z" fill="#d8892b"/>
    <circle cx="30" cy="-2" r="2.3" fill="#333"/>
    <circle cx="40" cy="-2" r="2.3" fill="#333"/>
    <path d="M32,6 q3,3 6,0" stroke="#333" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M-30,8 Q-52,-4 -46,-22" stroke="#f4a83c" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>
</svg>
