    <circle cx="70" cy="600" r="9"/><circle cx="100" cy="625" r="9"/><circle cx="45" cy="640" r="9"/>
    <circle cx="1140" cy="600" r="9"/><circle cx="1110" cy="630" r="9"/><circle cx="1160" cy="650" r="9"/>
  </g>
  <g fill="#ffd35c">
    <circle cx="70" cy="600" r="3.5"/><circle cx="100" cy="625" r="3.5"/><circle cx="45" cy="640" r="3.5"/>
    <circle cx="1140" cy="600" r="3.5"/><circle cx="1110" cy="630" r="3.5"/><circle cx="1160" cy="650" r="3.5"/>
  </g>
</svg>
