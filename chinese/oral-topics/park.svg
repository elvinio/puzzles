    <rect x="2" y="92" width="12" height="32" rx="6" fill="#f6c9a0"/>
    <ellipse cx="-8" cy="127" rx="11" ry="7" fill="#e05780"/>
    <ellipse cx="8" cy="127" rx="11" ry="7" fill="#e05780"/>
  </g>

