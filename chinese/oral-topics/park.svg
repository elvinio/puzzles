  <rect width="1200" height="800" fill="#cdeafd"/>
  <circle cx="1080" cy="110" r="62" fill="#ffd35c"/>
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="220" cy="110" rx="70" ry="26"/>
    <ellipse cx="290" cy="95" rx="55" ry="22"/>
    <ellipse cx="700" cy="70" rx="65" ry="24"/>
  </g>
  <rect y="520" width="1200" height="280" fill="#96d06e"/>
  <ellipse cx="600" cy="530" rx="700" ry="40" fill="#a7db81"/>
  <!-- path -->
  <path d="M0,760 Q600,640 1200,740 L1200,800 L0,800 Z" fill="#e8d9a8"/>

  <!-- trees -->
  <g>
    <rect x="88" y="380" width="26" height="150" rx="10" fill="#8a5a33"/>
    <circle cx="101" cy="330" r="85" fill="#5fae4a"/>
    <circle cx="55" cy="370" r="55" fill="#6fbe58"/>
    <circle cx="150" cy="370" r="55" fill="#6fbe58"/>
