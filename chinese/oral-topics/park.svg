    <circle cx="0" cy="17" r="21" fill="#f6c9a0"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#4a2f18"/>
    <circle cx="-16" cy="4" r="7" fill="#4a2f18"/>
    <circle cx="16" cy="4" r="7" fill="#4a2f18"/>
    <circle cx="-8" cy="15" r="2.5" fill="#333"/>
    <circle cx="8" cy="15" r="2.5" fill="#333"/>
    <path d="M-6,26 Q0,31 6,26" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-24,38 L24,38 L32,92 L-32,92 Z" fill="#9b6dd6"/>
