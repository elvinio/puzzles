    <rect x="230" y="510" width="200" height="16" rx="8" fill="#a5713f"/>
    <rect x="240" y="578" width="16" height="60" fill="#7d5330"/>
    <rect x="404" y="578" width="16" height="60" fill="#7d5330"/>
  </g>
  <g transform="translate(330,410)">
