  <g transform="translate(190,690)">
    <ellipse cx="0" cy="20" rx="42" ry="24" fill="#c98d5f"/>
    <circle cx="46" cy="0" r="20" fill="#c98d5f"/>
    <path d="M34,-14 L28,-32 L44,-22 Z" fill="#8a5a33"/>
    <path d="M58,-14 L64,-32 L48,-22 Z" fill="#8a5a33"/>
    <circle cx="42" cy="-2" r="2.5" fill="#333"/>
    <circle cx="54" cy="-2" r="2.5" fill="#333"/>
    <ellipse cx="50" cy="8" rx="5" ry="4" fill="#333"/>
    <path d="M-38,10 Q-58,-6 -50,-22" stroke="#c98d5f" stroke-width="10" fill="none" stroke-linecap="round"/>
