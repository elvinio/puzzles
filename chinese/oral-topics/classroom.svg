<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 在教室 In the classroom: teacher at the whiteboard, one pupil raising her hand,
       one listening, one sleeping at his desk. -->
  <rect width="1200" height="800" fill="#fdf6e6"/>
  <rect y="620" width="1200" height="180" fill="#d8b98a"/>
  <rect y="612" width="1200" height="12" fill="#c3a273"/>

  <!-- window -->
  <rect x="60" y="90" width="220" height="180" rx="10" fill="#bfe6fa" stroke="#8a99ac" stroke-width="8"/>
  <path d="M170,90 L170,270 M60,180 L280,180" stroke="#8a99ac" stroke-width="6"/>
  <circle cx="115" cy="135" r="22" fill="#ffd35c"/>

  <!-- clock -->
  <circle cx="1090" cy="120" r="46" fill="#ffffff" stroke="#5b6675" stroke-width="7"/>
  <path d="M1090,120 L1090,92 M1090,120 L1110,132" stroke="#5b6675" stroke-width="5" stroke-linecap="round"/>

  <!-- whiteboard -->
  <rect x="360" y="80" width="470" height="250" rx="10" fill="#ffffff" stroke="#9aa7b8" stroke-width="9"/>
  <text x="465" y="195" font-family="serif" font-size="82" fill="#374b63">华文课</text>
  <path d="M420,250 L560,250" stroke="#e05780" stroke-width="6" stroke-linecap="round"/>
  <path d="M600,235 L760,235 M600,265 L720,265" stroke="#7f9cc4" stroke-width="6" stroke-linecap="round"/>

  <!-- bookshelf -->
  <rect x="950" y="300" width="200" height="230" rx="8" fill="#a5713f"/>
  <rect x="965" y="320" width="170" height="80" fill="#8a5a33"/>
  <rect x="965" y="420" width="170" height="80" fill="#8a5a33"/>
  <g>
    <rect x="975" y="330" width="22" height="62" fill="#ef6461"/>
    <rect x="1002" y="336" width="22" height="56" fill="#4fb0a5"/>
    <rect x="1029" y="330" width="22" height="62" fill="#f4a83c"/>
    <rect x="1056" y="338" width="22" height="54" fill="#7f9cc4"/>
    <rect x="1083" y="330" width="22" height="62" fill="#9b6dd6"/>
    <rect x="975" y="432" width="22" height="60" fill="#7f9cc4"/>
    <rect x="1002" y="438" width="22" height="54" fill="#e05780"/>
    <rect x="1029" y="432" width="22" height="60" fill="#5fae4a"/>
    <rect x="1056" y="438" width="22" height="54" fill="#f4a83c"/>
  </g>

  <!-- teacher pointing at the board -->
  <g transform="translate(255,360)">
    <path d="M-23,18 A23,23 0 0 1 23,18 Z" fill="#2c2c2c"/>
    <circle cx="0" cy="18" r="23" fill="#e8b48a"/>
    <path d="M-23,14 A23,23 0 0 1 23,14 L23,6 A23,23 0 0 0 -23,6 Z" fill="#2c2c2c"/>
    <path d="M-23,14 Q-30,36 -22,52 L-16,20 Z" fill="#2c2c2c"/>
    <path d="M23,14 Q30,36 22,52 L16,20 Z" fill="#2c2c2c"/>
    <circle cx="-8" cy="17" r="2.7" fill="#333"/>
    <circle cx="8" cy="17" r="2.7" fill="#333"/>
    <path d="M-7,28 Q0,34 7,28" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-26,42 L26,42 L34,120 L-34,120 Z" fill="#4f77b0"/>
    <!-- pointing arm with stick toward board -->
    <path d="M20,52 L60,10" stroke="#4f77b0" stroke-width="11" stroke-linecap="round"/>
    <path d="M60,10 L110,-48" stroke="#8a5a33" stroke-width="6" stroke-linecap="round"/>
    <path d="M-20,52 L-30,96" stroke="#4f77b0" stroke-width="11" stroke-linecap="round"/>
    <!-- book in lower hand -->
    <rect x="-48" y="88" width="34" height="26" rx="4" fill="#fff4d6" stroke="#c9a95e" stroke-width="3"/>
    <rect x="-16" y="120" width="13" height="42" rx="6" fill="#31456b"/>
    <rect x="3" y="120" width="13" height="42" rx="6" fill="#31456b"/>
    <ellipse cx="-10" cy="166" rx="12" ry="7" fill="#3c3c46"/>
    <ellipse cx="10" cy="166" rx="12" ry="7" fill="#3c3c46"/>
  </g>

  <!-- pupil 1: girl raising her hand -->
  <g transform="translate(480,505)">
    <rect x="-60" y="90" width="130" height="16" rx="6" fill="#a5713f"/>
    <rect x="-52" y="106" width="12" height="60" fill="#7d5330"/>
    <rect x="50" y="106" width="12" height="60" fill="#7d5330"/>
    <rect x="-40" y="74" width="52" height="12" rx="4" fill="#fff4d6" stroke="#c9a95e" stroke-width="2.5"/>
    <path d="M-21,-52 A21,21 0 0 1 21,-52 Z" fill="#4a2f18"/>
    <circle cx="0" cy="-52" r="21" fill="#f6c9a0"/>
    <path d="M-21,-57 A21,21 0 0 1 21,-57 L21,-63 A21,21 0 0 0 -21,-63 Z" fill="#4a2f18"/>
    <circle cx="-17" cy="-66" r="7" fill="#4a2f18"/>
    <circle cx="17" cy="-66" r="7" fill="#4a2f18"/>
    <circle cx="-8" cy="-54" r="2.5" fill="#333"/>
    <circle cx="8" cy="-54" r="2.5" fill="#333"/>
    <path d="M-6,-43 Q0,-38 6,-43" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-19" y="-31" width="38" height="50" rx="12" fill="#ef6461"/>
    <!-- raised arm -->
    <path d="M17,-22 L36,-70" stroke="#ef6461" stroke-width="10" stroke-linecap="round"/>
    <circle cx="38" cy="-76" r="8" fill="#f6c9a0"/>
    <path d="M-17,-22 L-30,10" stroke="#ef6461" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- pupil 2: boy listening -->
  <g transform="translate(720,505)">
    <rect x="-60" y="90" width="130" height="16" rx="6" fill="#a5713f"/>
    <rect x="-52" y="106" width="12" height="60" fill="#7d5330"/>
    <rect x="50" y="106" width="12" height="60" fill="#7d5330"/>
    <rect x="-40" y="74" width="52" height="12" rx="4" fill="#d6ecf9" stroke="#8fb6d3" stroke-width="2.5"/>
    <path d="M-21,-52 A21,21 0 0 1 21,-52 Z" fill="#151515"/>
    <circle cx="0" cy="-52" r="21" fill="#c98d5f"/>
    <path d="M-21,-57 A21,21 0 0 1 21,-57 L21,-63 A21,21 0 0 0 -21,-63 Z" fill="#151515"/>
    <circle cx="-8" cy="-54" r="2.5" fill="#333"/>
    <circle cx="8" cy="-54" r="2.5" fill="#333"/>
    <path d="M-6,-43 Q0,-38 6,-43" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-19" y="-31" width="38" height="50" rx="12" fill="#4fb0a5"/>
    <path d="M-17,-22 L-32,14" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M17,-22 L32,14" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- pupil 3: boy asleep on his desk -->
  <g transform="translate(940,545)">
    <rect x="-60" y="50" width="130" height="16" rx="6" fill="#a5713f"/>
    <rect x="-52" y="66" width="12" height="60" fill="#7d5330"/>
    <rect x="50" y="66" width="12" height="60" fill="#7d5330"/>
    <!-- head resting on folded arms on the desk -->
    <path d="M-40,44 L44,44" stroke="#f4a83c" stroke-width="14" stroke-linecap="round"/>
    <path d="M-19,10 A19,19 0 0 1 19,10 Z" fill="#2c2c2c" transform="rotate(-14)"/>
    <circle cx="0" cy="12" r="20" fill="#e8b48a"/>
    <path d="M-20,7 A20,20 0 0 1 20,7 L20,1 A20,20 0 0 0 -20,1 Z" fill="#2c2c2c"/>
    <path d="M-11,14 Q-7,17 -3,14 M4,14 Q8,17 12,14" stroke="#333" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <text x="-72" y="-30" font-family="sans-serif" font-size="30" font-weight="bold" fill="#8a99ac">Z</text>
    <text x="-96" y="-52" font-family="sans-serif" font-size="24" font-weight="bold" fill="#aab7c8">z</text>
  </g>
</svg>
