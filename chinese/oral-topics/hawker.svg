<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 在小贩中心 At the hawker centre: a noodle stall with the cook, a family eating at
       a round table, and a boy returning his tray to the tray station. -->
  <rect width="1200" height="800" fill="#fdf1e3"/>
  <rect y="600" width="1200" height="200" fill="#e3c9a3"/>
  <rect y="592" width="1200" height="10" fill="#d2b58c"/>

  <!-- noodle stall -->
  <g>
    <rect x="80" y="120" width="440" height="70" rx="10" fill="#e2574c"/>
    <text x="150" y="172" font-family="serif" font-size="46" fill="#ffffff">美味面食</text>
    <rect x="420" y="132" width="80" height="46" rx="8" fill="#ffd35c"/>
    <text x="432" y="166" font-family="sans-serif" font-size="28" fill="#7a3b3b">$4</text>
    <rect x="90" y="190" width="420" height="16" fill="#c9c9c9"/>
    <rect x="90" y="206" width="420" height="180" fill="#f7f7f7" stroke="#c9c9c9" stroke-width="4"/>
    <rect x="90" y="386" width="420" height="90" fill="#d8d8d8"/>
    <!-- hanging noodles / food display -->
    <ellipse cx="180" cy="300" rx="52" ry="30" fill="#ffe3a3" stroke="#d8b060" stroke-width="4"/>
    <path d="M150,296 q10,-14 22,0 q10,-14 22,0 q10,-14 20,0" stroke="#d8a03c" stroke-width="4" fill="none"/>
    <ellipse cx="320" cy="300" rx="44" ry="28" fill="#c8e6b8" stroke="#7aa863" stroke-width="4"/>
    <!-- steaming pot -->
    <rect x="400" y="290" width="86" height="60" rx="8" fill="#8f9aa8"/>
    <path d="M418,278 q6,-16 -2,-28 M444,278 q6,-16 -2,-28 M468,278 q6,-16 -2,-28" stroke="#b9c4d1" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- cook behind the stall -->
  <g transform="translate(300,392)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#2c2c2c"/>
    <circle cx="0" cy="17" r="21" fill="#c98d5f"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#2c2c2c"/>
    <rect x="-16" y="-16" width="32" height="14" rx="5" fill="#ffffff"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <path d="M-6,27 Q0,32 6,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-21" y="38" width="42" height="48" rx="12" fill="#ffffff" stroke="#d0d0d0" stroke-width="3"/>
    <!-- holding a ladle -->
    <path d="M19,48 L44,30" stroke="#e8e8e8" stroke-width="10" stroke-linecap="round"/>
    <path d="M44,30 L58,14" stroke="#8f9aa8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="62" cy="10" r="9" fill="#8f9aa8"/>
    <path d="M-19,48 L-34,74" stroke="#e8e8e8" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- family eating at a round table -->
  <g>
    <ellipse cx="760" cy="560" rx="150" ry="34" fill="#f7f7f7" stroke="#c9c9c9" stroke-width="5"/>
    <rect x="745" y="592" width="30" height="90" fill="#b9b9b9"/>
    <!-- bowls and cups -->
    <ellipse cx="690" cy="552" rx="30" ry="13" fill="#ffe3a3" stroke="#d8b060" stroke-width="3"/>
    <ellipse cx="830" cy="552" rx="30" ry="13" fill="#c8e6b8" stroke="#7aa863" stroke-width="3"/>
    <rect x="752" y="524" width="18" height="26" rx="4" fill="#f4a83c"/>
    <path d="M770,528 L780,514" stroke="#7a3b3b" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- dad -->
  <g transform="translate(650,430)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#151515"/>
    <circle cx="0" cy="18" r="22" fill="#e8b48a"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#151515"/>
    <circle cx="-8" cy="16" r="2.6" fill="#333"/>
    <circle cx="8" cy="16" r="2.6" fill="#333"/>
    <path d="M-7,27 Q0,33 7,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="40" width="44" height="54" rx="13" fill="#4f77b0"/>
    <!-- chopsticks hand toward bowl -->
    <path d="M20,50 L44,86" stroke="#4f77b0" stroke-width="10" stroke-linecap="round"/>
    <path d="M44,86 L58,106 M48,84 L64,102" stroke="#8a5a33" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-20,50 L-30,86" stroke="#4f77b0" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- mum -->
  <g transform="translate(880,430)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#3b2a1c"/>
    <circle cx="0" cy="18" r="22" fill="#f2c396"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#3b2a1c"/>
    <path d="M-22,12 Q-30,40 -20,58 L-14,18 Z" fill="#3b2a1c"/>
    <path d="M22,12 Q30,40 20,58 L14,18 Z" fill="#3b2a1c"/>
    <circle cx="-8" cy="16" r="2.6" fill="#333"/>
    <circle cx="8" cy="16" r="2.6" fill="#333"/>
    <path d="M-7,27 Q0,33 7,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="40" width="44" height="54" rx="13" fill="#e05780"/>
    <path d="M-20,50 L-44,86" stroke="#e05780" stroke-width="10" stroke-linecap="round"/>
    <!-- spoon toward bowl -->
    <ellipse cx="-52" cy="94" rx="9" ry="6" fill="#c9c9c9"/>
    <path d="M20,50 L30,86" stroke="#e05780" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- little sister drinking -->
  <g transform="translate(766,452) scale(0.85)">
    <path d="M-21,17 A21,21 0 0 1 21,17 Z" fill="#4a2f18"/>
    <circle cx="0" cy="17" r="21" fill="#f6c9a0"/>
    <path d="M-21,12 A21,21 0 0 1 21,12 L21,6 A21,21 0 0 0 -21,6 Z" fill="#4a2f18"/>
    <circle cx="-16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="16" cy="2" r="7" fill="#4a2f18"/>
    <circle cx="-7" cy="16" r="2.5" fill="#333"/>
    <circle cx="7" cy="16" r="2.5" fill="#333"/>
    <ellipse cx="0" cy="28" rx="4" ry="5" fill="#7a3b3b"/>
    <rect x="-20" y="38" width="40" height="48" rx="12" fill="#ffd35c"/>
    <path d="M-18,48 L-8,80" stroke="#ffd35c" stroke-width="10" stroke-linecap="round"/>
    <path d="M18,48 L8,80" stroke="#ffd35c" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- tray return station + boy returning tray -->
  <g>
    <rect x="80" y="560" width="230" height="20" rx="6" fill="#8f9aa8"/>
    <rect x="92" y="580" width="16" height="110" fill="#77828f"/>
    <rect x="282" y="580" width="16" height="110" fill="#77828f"/>
    <rect x="100" y="470" width="190" height="84" rx="10" fill="#5f9e5f"/>
    <text x="120" y="512" font-family="serif" font-size="34" fill="#ffffff">请把餐盘</text>
    <text x="137" y="546" font-family="serif" font-size="34" fill="#ffffff">放回这里</text>
    <rect x="120" y="536" width="150" height="10" rx="4" fill="#4c804c" opacity="0"/>
    <!-- stacked trays -->
    <rect x="130" y="544" width="130" height="9" rx="4" fill="#c9764a" opacity="0"/>
  </g>
  <g transform="translate(420,565)">
    <path d="M-22,18 A22,22 0 0 1 22,18 Z" fill="#2c2c2c"/>
    <circle cx="0" cy="18" r="22" fill="#f6c9a0"/>
    <path d="M-22,12 A22,22 0 0 1 22,12 L22,6 A22,22 0 0 0 -22,6 Z" fill="#2c2c2c"/>
    <circle cx="-8" cy="16" r="2.6" fill="#333"/>
    <circle cx="8" cy="16" r="2.6" fill="#333"/>
    <path d="M-7,27 Q0,33 7,27" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-20" y="40" width="40" height="52" rx="12" fill="#4fb0a5"/>
    <!-- both arms forward carrying a tray with a bowl -->
    <path d="M-18,50 L-52,62" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M-14,56 L-52,74" stroke="#4fb0a5" stroke-width="10" stroke-linecap="round"/>
    <rect x="-104" y="56" width="70" height="10" rx="4" fill="#c9764a"/>
    <ellipse cx="-70" cy="52" rx="18" ry="9" fill="#ffe3a3" stroke="#d8b060" stroke-width="3"/>
    <rect x="-16" y="90" width="13" height="36" rx="6" fill="#4a4a58"/>
    <rect x="3" y="90" width="13" height="36" rx="6" fill="#4a4a58"/>
    <ellipse cx="-10" cy="130" rx="12" ry="7" fill="#fff"/>
    <ellipse cx="10" cy="130" rx="12" ry="7" fill="#fff"/>
  </g>

  <!-- ceiling fans -->
  <g stroke="#8f9aa8" stroke-width="8" stroke-linecap="round">
    <path d="M700,60 L700,90"/>
    <path d="M640,96 L760,96"/>
    <path d="M1020,60 L1020,90"/>
    <path d="M960,96 L1080,96"/>
  </g>
  <circle cx="700" cy="96" r="10" fill="#77828f"/>
  <circle cx="1020" cy="96" r="10" fill="#77828f"/>
</svg>
